<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="BobNote" />
<meta name="theme-color" content="#f4f5f7" />
<link rel="apple-touch-icon" href="icon.png" />
<title>BobNote</title>
<style>
  :root{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --line:#e3e6ea;
    --ink:#2b2f36;
    --muted:#8a909a;
    --accent:#4c6ef5;
    --accent-soft:#dbe4ff;
    --shadow:0 1px 3px rgba(20,24,34,.12),0 6px 18px rgba(20,24,34,.10);
    --lift-shadow:0 14px 32px rgba(20,24,34,.24),0 5px 12px rgba(20,24,34,.16);   /* floating shadow shown only while a card is being dragged */
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); overflow:hidden;
  }

  /* ---------- App chrome ---------- */
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}   /* dvh tracks the REAL visible height on iPhone/iPad (100vh hides the bottom bar behind Safari's chrome); the vh line is the fallback for old browsers */
  #topbar{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);
    box-shadow:0 1px 0 rgba(0,0,0,.02);z-index:30;flex:0 0 auto;
  }
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px;margin-right:4px;display:flex;align-items:center;gap:6px;}
  .brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block;}
  .tool-group{display:flex;align-items:center;gap:4px;padding:0 6px;border-left:1px solid var(--line);}
  .tool-group:first-of-type{border-left:none;}
  button.btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;line-height:1;
    display:inline-flex;align-items:center;gap:6px;transition:.12s;
  }
  button.btn:hover{background:#f0f2f5;border-color:#d3d8df;}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.btn.primary:hover{background:#3b5bdb;}
  button.btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.btn.active:hover{background:#3b5bdb;}
  button.btn:disabled{opacity:.4;cursor:default;background:#fff;}
  button.btn.icon{padding:4px;justify-content:center;}
  button.btn.icon svg{width:22px;height:22px;display:block;}   /* larger icon fill; padding trimmed so the button stays the same size */
  #syncBtn.sync-on,#odBtn.sync-on{color:#2f9e44;}          /* green = connected + saving */
  #syncBtn.sync-reconnect,#odBtn.sync-reconnect{color:#e8a13b;}   /* amber = remembered, click to reconnect / sign in */
  #syncBtn.sync-err,#odBtn.sync-err{color:#e03131;}       /* red = last write failed */
  /* magnetic drop target highlight while connecting / re-attaching */
  .card.drop-target{outline:3px solid var(--accent) !important;outline-offset:3px;box-shadow:0 0 0 6px var(--accent-soft);}
  /* marquee (rubber-band) selection box */
  #marquee{position:fixed;display:none;border:1px solid var(--accent);background:rgba(76,110,245,.12);z-index:25;pointer-events:none;}
  #notify{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);max-width:560px;background:#2b2f36;color:#fff;border-left:4px solid #f59f00;padding:10px 16px;border-radius:8px;font-size:13px;line-height:1.45;box-shadow:0 8px 26px rgba(0,0,0,.28);z-index:200;opacity:0;pointer-events:none;transition:opacity .2s;cursor:pointer;}
  #notify.show{opacity:1;pointer-events:auto;}
  .spacer{flex:1 1 auto;}
  .zoomctl{display:flex;align-items:center;gap:2px;}
  .zoomctl button{width:30px;}
  #zoomLabel{min-width:46px;text-align:center;font-size:12px;color:var(--muted);}

  #breadcrumb{
    display:flex;align-items:center;gap:4px;
    min-width:0;overflow:hidden;flex:0 1 auto;font-size:13px;margin-left:2px;
  }
  .crumb{border:none;background:none;color:var(--accent);cursor:pointer;padding:2px 4px;border-radius:6px;font-size:13px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .crumb:hover{background:var(--accent-soft);}
  .crumb.drop-target{background:var(--accent) !important;color:#fff !important;}
  .crumb:last-child{color:var(--ink);font-weight:600;}
  .crumb-sep{color:var(--muted);}

  /* ---------- Stage: left toolbar · center · right basket ---------- */
  #stage{display:flex;flex:1 1 auto;min-height:0;position:relative;}   /* positioned so the full-window draw editor overlay can cover it */
  #center{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;}
  #leftbar{flex:0 0 auto;width:66px;background:#edf0f4;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:15px;padding:14px 4px;overflow-y:auto;z-index:18;}
  .ltool{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;padding:0;font-size:11px;font-weight:500;cursor:grab;color:#5b626d;font-family:inherit;line-height:1.1;}
  .ltool:active{cursor:grabbing;}
  .lt-ic{width:38px;height:38px;background:#fff;border-radius:11px;box-shadow:0 1px 3px rgba(20,24,34,.12);display:flex;align-items:center;justify-content:center;color:#3a3f47;transition:box-shadow .12s,transform .12s;}
  .lt-ic svg{width:26px;height:26px;display:block;}   /* fill more of the 38px tile (bigger, clearer icon; tile size unchanged) */
  .lt-ic.lt-emoji{font-size:19px;line-height:1;}
  .lt-ic.lt-gray{filter:grayscale(1);}
  .ltool:hover .lt-ic{box-shadow:0 3px 9px rgba(20,24,34,.18);transform:translateY(-1px);}
  .ltool[data-add="board"] .lt-ic{background:linear-gradient(135deg,#5c7cfa,#4263eb);color:#fff;box-shadow:0 2px 7px rgba(66,99,235,.35);}
  .ltool.dragging-new{opacity:.5;}
  .ltool.active .lt-ic{background:var(--accent);color:#fff;box-shadow:0 3px 9px rgba(76,110,245,.4);}
  .lt-spacer{flex:1 1 auto;min-height:10px;}                                    /* pushes the reserved slots to the bottom */
  .lt-reserved{cursor:default;}
  .lt-reserved .lt-ic{background:transparent;border:1.5px dashed #c3c9d3;box-shadow:none;color:#bcc2cc;}
  .lt-reserved:hover .lt-ic{box-shadow:none;transform:none;}
  body.connect-mode .arrow-hit{pointer-events:none;}   /* in connect mode, existing lines don't intercept the gesture */
  /* right basket (Unsorted tray) */
  #basket{flex:0 0 auto;width:0;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width .14s ease;}
  #basket.show{width:210px;}
  #basket.drop-hover{box-shadow:inset 0 0 0 2px var(--accent);}
  .basket-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:14px;}
  .basket-head b{flex:1 1 auto;}
  #basketList{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .basket-item{display:flex;align-items:center;gap:8px;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:grab;background:#fff;}
  .basket-item:hover{background:#f0f2f5;}
  .basket-item .bi-thumb{width:34px;height:34px;flex:0 0 auto;border-radius:6px;background:#f1f3f5;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
  .basket-item .bi-thumb img{width:100%;height:100%;object-fit:cover;}
  .basket-item .bi-name{flex:1 1 auto;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .basket-item .bi-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .basket-empty{padding:14px;font-size:11px;color:var(--muted);text-align:center;}
  #basket.show .basket-empty{display:block;}
  #basketList:not(:empty)+.basket-empty{display:none;}

  /* ---------- Canvas ---------- */
  #viewport{
    position:relative;flex:1 1 auto;overflow:hidden;cursor:default;
    touch-action:none;   /* the canvas handles its own pan/pinch (touch gesture manager) — stops iOS from hijacking one-finger drag as page-scroll and two-finger as browser-zoom */
    background-image:none;   /* the faint square-dot grid is applied live by applyView() — it fades out below ~100% zoom (dense dots can trigger trypophobia) while snapping stays on */
    background-size:10px 10px;background-position:0 0;
  }
  #viewport.panning{cursor:grabbing;}
  /* while a field is actively being edited, let touch do normal caret / text-selection / scroll INSIDE it (the drag-move on a non-editing card stays touch-action:none) */
  [contenteditable="true"], #viewport input, #viewport textarea{ touch-action:auto; -webkit-user-select:text; }
  .lp-pick{box-shadow:0 10px 26px rgba(20,24,34,.28) !important;filter:brightness(1.02);}   /* long-press pick-up feedback: the card visibly lifts the moment it's grabbed */
  /* full-canvas Draw / Mask sessions */
  .ltool.mask-on .lt-ic{background:#e03131;color:#fff;box-shadow:0 3px 9px rgba(224,49,49,.45);}   /* the Mask tile burns red while the session is live (click again to finish) */
  .ltool.tool-disabled{opacity:.35;cursor:not-allowed;}                                            /* greyed while the draw editor is open — finish with ✓ Done first */
  .ltool.tool-disabled .lt-ic{box-shadow:none;transform:none;}
  #drawDone{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:70;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:10px 24px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(76,110,245,.45);}
  #drawDone:hover{filter:brightness(1.07);}
  #viewport.draw-session{outline:2px solid var(--accent);outline-offset:-2px;}   /* subtle frame = you're on a drawing sheet, the board is still underneath */
  #drawEditor{position:absolute;inset:0;z-index:80;background:rgba(38,43,54,.5);overflow:hidden;touch-action:none;}   /* the full-window drawing editor: focused, dimmed surroundings */
  #edHolder{position:absolute;left:0;top:0;transform-origin:0 0;box-shadow:0 12px 44px rgba(0,0,0,.4);}
  #edHolder svg{display:block;flex:none;min-height:0;border-radius:2px;}      /* neutralize .sketch-svg's fill-the-card sizing — the editor sizes it explicitly */
  .card,.card img{-webkit-touch-callout:none;-webkit-user-select:none;}   /* iOS: our long-press means "pick the card up" — suppress the native image callout/preview that would steal it (editable fields re-enable selection above) */
  @media (pointer:coarse){                          /* finger-sized targets on touch devices — the Mac (fine pointer) keeps its tight UI unchanged */
    .handle-resize{ width:22px;height:22px;right:-9px;bottom:-9px; }
    .ep-handle{ stroke-width:3.5; }
    .prop-btn{ min-height:34px; }
    button.btn.icon{ min-width:36px; min-height:34px; }
    .lt-ic{ box-shadow:0 1px 3px rgba(20,24,34,.14); }
  }
  #world{position:absolute;left:0;top:0;transform-origin:0 0;}
  #arrowSvg{position:absolute;left:0;top:0;overflow:visible;}
  #drawSvg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  #cardsLayer{position:absolute;left:0;top:0;}

  .arrow{stroke:#6b7480;stroke-width:2;fill:none;pointer-events:none;}
  .arrow-hit{stroke:transparent;stroke-width:14;cursor:pointer;pointer-events:stroke;fill:none;}
  .arrow-halo{stroke:var(--accent);stroke-width:8;opacity:.3;fill:none;stroke-linecap:round;pointer-events:none;}

  /* ---------- Cards ---------- */
  .card{
    position:absolute;background:var(--card-color,#fff);border:1px solid rgba(20,24,34,.10);
    border-radius:0;box-shadow:none;min-width:120px;min-height:48px;   /* Milanote-style sharp 90° corners; flat on the canvas (no resting shadow) */
    --card-color:#fff;user-select:none;
  }
  .card.selected{outline:2px solid var(--accent);outline-offset:2px;}
  .card.editing{cursor:text;}
  .card.dragging{box-shadow:var(--lift-shadow);outline:none;}   /* while dragging: float with a shadow, but drop the selection outline so the card's true edges stay visible for precise placement (selection outline returns on drop) */

  .note-content{
    padding:12px 14px;font-family:Arial,Helvetica,sans-serif;font-size:var(--font-size,14px);line-height:1.45;min-height:24px;outline:none;
    white-space:pre-wrap;word-break:break-word;cursor:inherit;
    color:var(--font-color,#2b2f36);text-align:var(--text-align,left);
  }
  .note-clip{position:relative;}
  .card-note .note-clip{height:100%;overflow:hidden;}            /* a resized note clips overflowing text to its box (the SE resize handle is a sibling, so it isn't clipped) */
  .card-note.overflowing:not(.editing) .note-clip::after{        /* Milanote-style: fade the last visible line to hint there's more — double-click expands the card to show it all */
    content:'';position:absolute;left:0;right:0;bottom:0;height:38px;pointer-events:none;
    background:linear-gradient(to bottom, transparent, var(--card-color,#fff));
  }
  .card.transparent{background:transparent;border-color:transparent;box-shadow:none;}
  .card-table{border:none;display:flex;flex-direction:column;}                  /* grid is the boundary (no double frame); flex lets the grid fill the card height */
  .table-wrap{padding:0;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}   /* flush + stretches so there's never a bare strip below the grid */
  table.tbl{border-collapse:collapse;width:100%;table-layout:fixed;font-size:13px;flex:1 1 auto;}   /* grid fills the card height; table-layout:fixed distributes extra height to rows */
  .tcell{border:1px solid var(--line);padding:7px 9px;min-width:36px;height:calc(1.4em + 14px);vertical-align:top;word-break:break-word;outline:none;line-height:1.4;font-size:var(--font-size,13px);color:var(--font-color,#2b2f36);text-align:var(--text-align,left);}   /* reserve one line of the cell's own font (+ 7px×2 padding) so an empty new-table row is already the height of a typed row — no jump when you key in text (for display:table-cell, height acts as a minimum and em scales per-cell) */
  .tcell:empty::before{content:'';}
  th.tcell{background:#d6dbe1;font-weight:600;color:#3a3f47;}   /* clearer grey header row */
  .tcell[contenteditable="true"]{box-shadow:inset 0 0 0 2px var(--accent);}
  .card.selected .tcell.cell-selected{box-shadow:inset 0 0 0 2px var(--accent);}   /* selected cells (for formatting) */
  .table-ctl{display:none;gap:4px;flex-wrap:wrap;padding:8px;}   /* padding (not margin) so the buttons get breathing room now that the table is flush */
  .card.selected .table-ctl{display:flex;}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .tbtn:hover{background:#f0f2f5;border-color:#d3d8df;}
  .tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  /* spreadsheet-style row/column selector tabs around a selected table */
  .table-frame{position:relative;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
  .table-headers{position:absolute;inset:0;pointer-events:none;display:none;}
  .card-table.selected .table-headers{display:block;}             /* tabs appear only on a selected top-level table (never on a table nested in a column) */
  .th-cols{position:absolute;left:0;right:0;top:-27px;height:22px;display:flex;gap:4px;}
  .th-rows{position:absolute;top:0;bottom:0;left:-31px;width:26px;display:flex;flex-direction:column;gap:4px;}
  .th-col,.th-row,.th-corner{background:#e9ecef;border:1px solid var(--line);color:#6b7280;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;border-radius:6px;box-sizing:border-box;user-select:none;}
  .th-col{flex:1 1 0;min-width:0;}
  .th-row{flex:1 1 0;min-height:0;}
  .th-corner{position:absolute;top:-27px;left:-31px;width:26px;height:22px;}
  .th-col:hover,.th-row:hover,.th-corner:hover{background:#d6dbe1;}
  .card-sketch{overflow:hidden;}
  .sketch-wrap{display:flex;flex-direction:column;height:100%;}
  .sketch-svg{flex:1 1 auto;width:100%;display:block;background:#fff;border-radius:0;cursor:crosshair;touch-action:none;min-height:60px;}
  .card-sketch.transparent .sketch-svg{background:transparent !important;}
  .note-content[contenteditable="true"]{cursor:text;}
  /* cross-link chips inside notes + internal link cards */
  .xlink{padding:0 4px;border-radius:5px;background:#eef2ff;color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer;}
  .xlink::before{content:'↗ ';font-size:.85em;opacity:.8;}
  .xlink:hover{background:#e0e7ff;}
  .xlink.broken{background:#ffe3e3;color:#e03131;text-decoration:line-through;}
  .link-ttl-link.broken{color:#e03131;text-decoration:line-through;}
  .link.xlink-broken .link-sub{color:#e03131;}
  /* a text passage inside a note that a cross-link points TO (anchor) */
  .xanchor{border-bottom:1px dotted rgba(76,110,245,.55);transition:background .3s;}
  .xanchor.xanchor-flash{background:#ffe066;}
  /* synced cards: SW-corner badge + hover dropdown, and the post-paste "keep in sync?" strip */
  /* Milanote-style: a small, bare, fine red line-mark (no tile/outline/shadow) tucked into the SW corner so it never blocks card text. It is PART OF THE CARD and scales with the canvas zoom; only the pop-out dropdown stays zoom-independent. */
  .sync-badge{position:absolute;left:3px;bottom:3px;display:flex;align-items:center;justify-content:center;color:#e03131;z-index:6;cursor:pointer;line-height:0;}
  .sync-badge svg{width:8px;height:8px;display:block;}
  .sync-badge:hover,.sync-badge.open{color:#c92a2a;}
  /* the synced-copies dropdown lives at body level, position:fixed — constant size & never clipped by card/column/sketch overflow */
  .sync-pop{position:fixed;z-index:62;min-width:210px;max-width:280px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(15,23,42,.20);padding:6px;cursor:default;}
  .sync-pop-head{font-size:12px;color:var(--muted);text-align:center;padding:7px 10px 9px;line-height:1.4;}
  .sync-pop-row{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--ink);font-family:inherit;text-align:left;}
  .sync-pop-row:hover{background:#f1f3f5;}
  .sync-pop-row.here{cursor:default;}
  .sync-pop-sw{width:22px;height:22px;border-radius:5px;flex:0 0 auto;border:1px solid rgba(0,0,0,.06);}
  .sync-pop-nm{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sync-pop-ar{color:var(--muted);font-size:16px;}
  /* Note rich-text style menu (one icon -> Normal / Bullet / Numbered / Underline / Strikethrough) */
  .style-pop{position:fixed;z-index:62;min-width:172px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(15,23,42,.20);padding:6px;}
  .style-row{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--ink);font-family:inherit;text-align:left;}
  .style-row:hover{background:#f1f3f5;}
  .style-row .sk{width:18px;text-align:center;color:var(--muted);font-size:13px;flex:0 0 auto;}
  .sync-prompt{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:9px 14px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);z-index:7;}
  .sync-prompt-lbl{flex:1 1 auto;}
  .sync-prompt button{border:none;background:none;color:var(--accent);font-weight:500;cursor:pointer;font-size:13px;font-family:inherit;padding:0;}
  .sync-prompt .sync-no{color:var(--muted);}

  .img-content{display:block;width:100%;height:auto;border-radius:0;}

  .link{display:flex;flex-direction:column;padding:10px;gap:8px;height:100%;box-sizing:border-box;overflow:hidden;}
  .link-empty{padding:14px 12px;font-size:13px;color:var(--muted);}
  .link-img{display:block;width:100%;flex:1 1 auto;min-height:120px;object-fit:cover;background:#f1f3f5;border-radius:0;}   /* fills the card (covers) so a proportional resize stays clean */
  .link-row{display:flex;align-items:center;gap:8px;min-width:0;text-decoration:none;}
  .link-fav{width:18px;height:18px;flex:0 0 auto;border-radius:0;display:block;}
  .link-ic{flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .link-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1 1 auto;}
  .link-ttl-link{font-size:14px;font-weight:600;color:#e8590c;text-decoration:underline;text-decoration-thickness:1px;word-break:break-word;line-height:1.3;cursor:pointer;}
  .link-ttl-link:hover{color:#d9480f;}

  .todo{padding:10px 10px 8px;display:flex;flex-direction:column;gap:4px;}
  .todo-item{display:flex;align-items:flex-start;gap:7px;}
  .todo-item input[type="checkbox"]{width:16px;height:16px;cursor:pointer;flex:0 0 auto;margin-top:4px;}
  .todo-text{flex:1 1 auto;border:none;background:transparent;font-size:var(--font-size,13px);font-family:inherit;padding:3px 2px;outline:none;border-bottom:1px solid transparent;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);resize:none;overflow:hidden;line-height:1.4;pointer-events:none;}
  .editing .todo-text{pointer-events:auto;}             /* first click selects the card; double-click enters edit (works for nested column items too) */
  .todo-text:focus{border-bottom-color:var(--line);}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-del{opacity:0;border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;margin-top:2px;}
  .todo-item:hover .todo-del{opacity:1;}
  .todo-title{width:100%;border:none;background:transparent;font-family:inherit;font-size:16px;font-weight:600;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);padding:2px 2px 5px;margin-bottom:2px;outline:none;pointer-events:none;}
  .editing .todo-title{pointer-events:auto;}            /* select-first: title editable only after the card is in edit mode (double-click) */
  .todo-title:focus{border-bottom:1px solid var(--line);}
  .todo-ask{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:7px;padding-top:5px;font-size:13px;color:var(--muted);}
  .todo-ask button{border:none;background:none;padding:0;color:#6b7280;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline;}
  .todo-ask button:hover{color:var(--accent);}

  .card-board{background:transparent;border:none;box-shadow:none;}                  /* frameless board card (Milanote style) */
  .card-board:hover{background:rgba(0,0,0,.025);}
  .boardcard{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px;}
  .boardcard-cover{width:76px;height:76px;flex:0 0 auto;border:none;border-radius:18px;background:#d3d8df;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0;pointer-events:none;}   /* first click selects the board; rename/icon from the bottom bar */
  .boardcard-cover img{width:100%;height:100%;object-fit:cover;}
  .boardcard-cover:hover{filter:brightness(.96);}
  .boardcard-name{width:100%;border:none;background:transparent;font-size:var(--font-size,18px);font-weight:600;font-family:inherit;outline:none;min-width:40px;min-height:1.3em;color:var(--font-color,#2b2f36);text-align:center;pointer-events:none;white-space:normal;word-break:break-word;overflow-wrap:anywhere;}
  .card-board.editing .boardcard-name{pointer-events:auto;cursor:text;}   /* after Rename: click inside to position the caret / select text */
  .boardcard-stats{background:transparent;font-size:12px;color:var(--muted);text-align:center;}
  .boardcard-text{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;min-width:0;}
  /* a board dropped inside a column renders as a horizontal chip: icon left, name+stats right (Milanote list style) */
  .col-item .boardcard{flex-direction:row;align-items:center;gap:14px;padding:12px 14px;background:#f1f3f5;}
  .col-item .boardcard-text{align-items:flex-start;flex:1 1 auto;}
  .col-item .boardcard-name{text-align:left;}
  .col-item .boardcard-stats{text-align:left;}
  .cover-pop{position:fixed;z-index:50;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px;width:216px;}
  .cover-emos{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
  .cover-emos button{border:none;background:none;cursor:pointer;font-size:18px;padding:3px;border-radius:6px;}
  .cover-emos button:hover{background:#f0f2f5;}
  .cover-up{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;font-size:12px;padding:6px 8px;border-radius:6px;color:var(--ink);font-family:inherit;}
  .cover-up:hover{background:#f0f2f5;}

  /* shapes */
  .card-shape{background:transparent !important;border:none !important;box-shadow:none !important;}
  .shape{position:relative;width:100%;height:100%;}
  .shape svg{display:block;width:100%;height:100%;overflow:visible;}
  .shape svg .sh{fill:var(--card-color);stroke:rgba(20,24,34,.65);stroke-width:1.5;}
  .shape svg .sh-line{fill:none;stroke:var(--card-color);stroke-width:var(--line-w,4);stroke-dasharray:var(--line-dash,0);}
  .shape svg .sh-head{fill:var(--card-color);}
  .shape-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:var(--text-align,center);padding:8px;}
  .shape-text{max-width:100%;text-align:var(--text-align,center);font-size:var(--font-size,14px);line-height:1.3;outline:none;color:var(--font-color,#1f2733);white-space:pre-wrap;word-break:break-word;}
  .card-shape.selected{outline:2px solid var(--accent);outline-offset:4px;border-radius:0;}

  /* shape palette popover */
  .shape-pop{position:fixed;display:none;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:8px;z-index:40;grid-template-columns:repeat(3,1fr);gap:6px;}
  .shape-pop.show{display:grid;}
  /* dropdown menu (Insert) */
  /* search / trash side panels */
  .side-panel{position:fixed;right:14px;top:96px;width:320px;max-height:70vh;display:none;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:48;overflow:hidden;}
  .side-panel.show{display:flex;}
  /* Board structure (folder tree) pop-out */
  .tree-panel{position:fixed;left:80px;top:96px;width:300px;max-height:74vh;display:none;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:65;overflow:hidden;}
  .tree-panel.show{display:flex;}
  .tree-head{padding:9px 12px 9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;color:var(--ink);}
  .tree-head .tp-close{border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:6px;}
  .tree-head .tp-close:hover{background:#f0f2f5;}
  .board-tree{overflow:auto;padding:6px;}
  .bt-row{display:flex;align-items:center;gap:8px;width:100%;border:none;background:none;cursor:pointer;font-size:13px;color:var(--ink);font-family:inherit;text-align:left;padding:6px 8px;border-radius:7px;white-space:nowrap;}
  .bt-row:hover{background:#f1f3f5;}
  .bt-row.here{background:var(--accent-soft);color:var(--accent);font-weight:600;}
  .bt-ic{flex:0 0 auto;font-size:13px;line-height:1;}
  .bt-nm{overflow:hidden;text-overflow:ellipsis;}
  .sp-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);}
  .sp-head input{flex:1 1 auto;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;outline:none;}
  .sp-head b{flex:1 1 auto;font-size:14px;}
  .sp-close{border:none;background:none;cursor:pointer;font-size:15px;color:var(--muted);padding:2px 6px;}
  #searchResults{overflow-y:auto;padding:6px;}
  .trow{display:flex;align-items:center;gap:4px;}
  .sr-item{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:8px 10px;border-radius:8px;font-family:inherit;}
  .sr-item:hover{background:#f0f2f5;}
  .sr-snip{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-board{font-size:11px;color:var(--muted);margin-top:2px;}
  .sr-empty{font-size:12px;color:var(--muted);padding:14px;text-align:center;}
  .shape-pick{width:54px;height:46px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:grab;display:flex;align-items:center;justify-content:center;padding:7px;}
  .shape-pick:hover{background:#f0f2f5;border-color:#c8cdd5;}
  .shape-pick svg{width:100%;height:100%;overflow:visible;}
  .shape-pick .sh{fill:#cfe3ff;stroke:#5b7fb5;stroke-width:3;}
  .shape-pick .sh-line{fill:none;stroke:#5b7fb5;}
  .shape-pick .sh-head{fill:#5b7fb5;}

  /* bottom properties bar (per-object operations) */
  #propBar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:7px 12px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));background:var(--panel);border-top:1px solid var(--line);min-height:48px;overflow-x:auto;overflow-y:hidden;position:relative;z-index:60;}   /* safe-area: clears the iPhone/iPad home indicator (viewport-fit=cover); z-index so the keyboard-lift floats it over the canvas */
  .prop-chip{font-size:12px;font-weight:600;color:#495057;background:#f1f3f5;padding:5px 11px;border-radius:20px;white-space:nowrap;flex:0 0 auto;}
  .prop-colors{display:flex;align-items:center;gap:4px;overflow-x:auto;flex:1 1 auto;padding:3px 0;}
  .prop-sw{width:18px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.18);cursor:pointer;flex:0 0 auto;padding:0;transition:transform .1s;}
  .prop-sw.active{outline:2px solid var(--accent);outline-offset:1px;}
  .prop-sw:hover{transform:scale(1.18);}
  .prop-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .prop-actions.fill{flex:1 1 auto;}                     /* Link/Upload: fill the bar so the layer/trash icons pin to the far right */
  .prop-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;line-height:1;color:var(--ink);white-space:nowrap;}
  .prop-url{border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;min-width:240px;flex:1 1 auto;}
  .prop-url:focus{border-color:var(--accent);}
  .prop-btn:hover{background:#f0f2f5;}
  .prop-btn.on{background:var(--accent-soft);border-color:var(--accent);}
  .prop-btn.danger{color:#e03131;}
  .prop-btn.danger:hover{background:#ffe3e3;border-color:#ffa8a8;}
  .prop-btn.prop-icon{padding:1.5px 8px;display:inline-flex;align-items:center;justify-content:center;}
  .prop-btn.prop-icon svg{width:22px;height:22px;display:block;}   /* 22px glyph in 1.5px padding + 1px border = 27px button — exactly matches the text buttons (13px line + 6px×2 padding + 1px border), so the bar stays aligned */
  .prop-fontsize{font-size:12px;font-weight:500;color:#5b626d;min-width:36px;text-align:center;flex:0 0 auto;}
  .prop-empty{font-size:12px;color:var(--muted);flex:1 1 auto;}
  .prop-fc-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 9px;line-height:1;flex:0 0 auto;}
  .prop-fc-btn .fc-a{font-size:13px;font-weight:700;}
  .prop-fc-btn .fc-bar{width:16px;height:3px;border-radius:2px;border:1px solid rgba(0,0,0,.18);}
  .prop-colors.font-target{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;background:var(--accent-soft);}
  .prop-align{display:inline-flex;gap:2px;flex:0 0 auto;}
  .align-btn{padding:5px 7px;display:inline-flex;align-items:center;justify-content:center;}
  .align-btn.on{color:var(--accent);background:var(--accent-soft);border-color:var(--accent);}

  /* file shortcut card — frameless, small icon (Milanote-style) */
  .card-file{background:transparent;border:none;box-shadow:none;}
  .card-file:hover{background:rgba(0,0,0,.025);}
  .filecard{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;}
  .file-thumb{flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .file-thumb .fic{width:31px;height:auto;display:block;filter:drop-shadow(0 1px 2px rgba(15,23,42,.12));}
  .file-thumb img{width:31px;height:31px;object-fit:cover;border-radius:4px;}
  .file-name{font-size:16px;font-weight:600;text-align:center;word-break:break-word;line-height:1.3;color:var(--ink);}
  .file-size{font-size:12px;color:var(--muted);text-align:center;}
  .filecard.broken .file-thumb{opacity:.4;filter:grayscale(1);}
  .filecard.broken .file-name{color:#e03131;text-decoration:line-through;}
  .file-relink{margin-top:2px;font-size:11px;color:#e03131;background:#fff5f5;border:1px solid #ffc9c9;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:inherit;pointer-events:auto;}
  .file-relink:hover{background:#ffe3e3;}

  /* column (Kanban container) */
  .column{display:flex;flex-direction:column;gap:6px;padding:8px;}
  .col-head{display:flex;align-items:center;gap:6px;}
  .col-toggle{border:none;background:none;cursor:pointer;font-size:11px;color:var(--muted);padding:0 2px;}
  .col-title{flex:1 1 auto;border:none;background:transparent;font-weight:600;font-size:var(--font-size,18px);font-family:inherit;outline:none;min-width:30px;min-height:30px;line-height:30px;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);pointer-events:none;}   /* roomy header (≈24px-font height) while the font stays 18px */
  .editing .col-title{pointer-events:auto;}
  .col-count{flex:0 0 auto;font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:10px;padding:1px 7px;}
  .col-body{display:flex;flex-direction:column;gap:6px;}
  .col-empty{min-height:104px;background:rgba(15,23,42,.045);border-radius:0;}   /* drop area shown while a column has no cards */
  .col-item{display:flex;align-items:stretch;background:var(--card-color,#fff);border:1px solid var(--line);border-radius:0;overflow:hidden;}
  .col-item-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;box-shadow:0 8px 22px rgba(15,23,42,.22);transform:rotate(1.5deg);}
  .col-item-content{flex:1 1 auto;min-width:0;--font-size:initial;--font-color:initial;--text-align:initial;pointer-events:none;}   /* items inert until the column is selected (select-the-column-first) */
  .card-column.selected .col-item-content{pointer-events:auto;}
  /* column drop-insertion indicator */
  .col-item.drop-above{box-shadow:0 -3px 0 -1px var(--accent);}
  .col-item.drop-below{box-shadow:0 3px 0 -1px var(--accent);}
  .col-body.col-insert-empty{outline:2px dashed var(--accent);outline-offset:2px;border-radius:0;min-height:26px;}
  .col-head.col-insert-empty{outline:2px dashed var(--accent);outline-offset:3px;border-radius:0;}

  /* audio / video objects */
  .media{padding:8px;display:flex;flex-direction:column;gap:6px;}
  .media audio{width:100%;display:block;}
  .media video{width:100%;display:block;border-radius:0;background:#000;}
  .media-name{font-size:11px;color:var(--muted);text-align:center;word-break:break-word;}
  .media-missing{padding:16px 10px;text-align:center;font-size:13px;color:var(--muted);background:#f1f3f5;border-radius:0;}

  /* card handles */
  .handle{position:absolute;}
  .handle-resize{right:-5px;bottom:-5px;width:14px;height:14px;border:2px solid var(--accent);background:#fff;border-radius:4px;cursor:nwse-resize;display:none;}
  .card-column .handle-resize,.card-todo .handle-resize{cursor:ew-resize;}   /* width-only resize (height auto) */
  .card.selected .handle-resize{display:block;}
  /* PPT-style rotation handle (shapes) */
  .rotate-handle{position:absolute;top:-30px;left:50%;margin-left:-8px;width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);background:#fff;cursor:grab;display:none;box-shadow:0 1px 3px rgba(0,0,0,.25);z-index:7;}
  .rotate-handle::before{content:"";position:absolute;left:50%;top:14px;width:2px;height:16px;background:var(--accent);margin-left:-1px;}
  .card-shape.selected .rotate-handle{display:block;}
  .handle-resize{z-index:8;}
  /* Connector mode: drag from one card/shape to another to link them */
  body.connect-mode #viewport,body.connect-mode #cardsLayer,body.connect-mode .card{cursor:crosshair;}
  /* draggable endpoint handles for a selected connector */
  #overlaySvg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  .ep-handle{fill:#fff;stroke:var(--accent);stroke-width:2.5;pointer-events:auto;cursor:grab;}
  .mid-handle{fill:var(--accent-soft);}                          /* curve bend point */
  .conn-pt{fill:#fff;stroke:var(--accent);stroke-width:2;}        /* connection points shown while wiring */
  .conn-pt.near{fill:var(--accent);}
  .ep-handle:hover{fill:var(--accent-soft);}


  /* ---------- Modal ---------- */
  #overlay{position:fixed;inset:0;background:rgba(20,24,34,.32);display:none;align-items:center;justify-content:center;z-index:50;}
  #overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;box-shadow:0 12px 50px rgba(0,0,0,.3);width:340px;padding:20px;}
  .modal h3{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field select{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .hint-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}

  .align-guide{position:absolute;background:#e8590c;pointer-events:none;z-index:19;display:none;}   /* smart alignment guide (PowerPoint-style) */
  .align-guide.align-v{top:0;bottom:0;width:1px;}
  .align-guide.align-h{left:0;right:0;height:1px;}

  /* ---------- Print ---------- */
  #print-root{display:none;}
  #print-scale{transform-origin:top left;position:relative;}
  #print-offset{position:absolute;left:0;top:0;}
  @media print{
    #app{display:none !important;}
    #overlay{display:none !important;}
    #print-root{display:block;position:absolute;left:0;top:0;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .card{box-shadow:none !important;}
    body{background:#fff;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="brand"><span class="dot"></span>BobNote</div>
    <div id="breadcrumb"></div>
    <div class="spacer"></div>
    <div class="tool-group">
      <button class="btn icon" id="navBack" title="Back — previous view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="btn icon" id="navFwd" title="Forward — next view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
    <div class="tool-group">
      <button class="btn icon" id="undoBtn" title="Undo (⌘Z / Ctrl+Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg></button>
      <button class="btn icon" id="redoBtn" title="Redo (⌘⇧Z / Ctrl+Y)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h1"/></svg></button>
    </div>
    <div class="tool-group">
      <button class="btn icon" id="searchBtn" title="Search all boards (⌘F)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
      <button class="btn icon" id="treeBtn" title="Board structure — the folder tree of all boards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="4.5" rx="1"/><rect x="3" y="16.5" width="6" height="4.5" rx="1"/><rect x="15" y="16.5" width="6" height="4.5" rx="1"/><path d="M12 7.5v6.5M6 16.5v-2.5h12v2.5"/></svg></button>
      <button class="btn icon" id="spellBtn" title="Spell check — red-squiggle checking while you edit text (off by default)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l4 4 8-10"/><path d="M3 20q1.5-2 3 0t3 0 3 0 3 0 3 0" stroke-width="1.5"/></svg></button>
      <button class="btn icon" id="xlinkBtn" title="Cross-link — link to the selected card / board / file (copies to clipboard + drops a draggable Link in the Basket)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2-2a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-2 2a5 5 0 0 0 7.07 7.07l1.5-1.5"/></svg></button>
    </div>
    <div class="tool-group"><button class="btn icon" id="exportPdf" title="Export PDF"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 8.6 V4.3 a1.2 1.2 0 0 1 1.2-1.2 h8.6 a1.2 1.2 0 0 1 1.2 1.2 V8.6"/><path d="M6.5 16.5 H4.6 A1.6 1.6 0 0 1 3 14.9 V10.6 A1.6 1.6 0 0 1 4.6 9 H19.4 A1.6 1.6 0 0 1 21 10.6 V14.9 A1.6 1.6 0 0 1 19.4 16.5 H17.5"/><rect x="6.5" y="13.4" width="11" height="7.2" rx="1.4"/><line x1="9.2" y1="16.2" x2="14.8" y2="16.2"/><line x1="9.2" y1="18.2" x2="14.8" y2="18.2"/><circle cx="17.2" cy="11.5" r="0.85" fill="currentColor" stroke="none"/></svg></button></div>
