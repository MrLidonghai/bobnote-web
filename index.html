  .sync-pop-row{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:var(--ink);font-family:inherit;text-align:left;}
  .sync-pop-row:hover{background:#f1f3f5;}
  .sync-pop-row.here{cursor:default;}
  .sync-pop-sw{width:22px;height:22px;border-radius:5px;flex:0 0 auto;border:1px solid rgba(0,0,0,.06);}
  .sync-pop-nm{flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sync-pop-ar{color:var(--muted);font-size:16px;}
  /* Note rich-text style menu (one icon -> Normal / Bullet / Numbered / Underline / Strikethrough) */
  .style-pop{position:fixed;z-index:62;min-width:172px;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 30px rgba(15,23,42,.20);padding:6px;max-height:calc(100vh - 16px);overflow-y:auto;}   /* the 13-row menu scrolls internally on short screens (phone landscape) instead of clipping off-screen */
  .style-row{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:14px;color:var(--ink);font-family:inherit;text-align:left;}
  .style-row:hover{background:#f1f3f5;}
  .style-row .sk{width:18px;text-align:center;color:var(--muted);font-size:13px;flex:0 0 auto;}
  .style-hl{border-top:1px solid var(--line);margin-top:6px;padding:8px 10px 6px;}
  .style-hl-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
  .style-hl-chips{display:flex;gap:6px;}
  .style-hl-chip{width:26px;height:24px;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0;background:#fff;color:var(--muted);font-family:inherit;}
  .style-hl-chip:hover{outline:2px solid var(--accent);outline-offset:1px;}
  #hlPop .style-hl{border-top:none;margin-top:0;padding-top:6px;}                                    /* standalone Highlight pop-out: no divider at its top */
  .prop-hl-btn{padding:4px 8px;display:inline-flex;align-items:center;flex:0 0 auto;}
  .prop-hl-btn .hl-a{display:inline-block;font-size:12px;font-weight:700;background:#ffe066;color:#4d3f10;padding:1px 6px;border-radius:4px;line-height:1.3;}   /* highlighted-A icon */
  .sync-prompt{position:absolute;left:0;right:0;bottom:0;background:rgba(255,255,255,.97);border-top:1px solid var(--line);padding:9px 14px;display:flex;align-items:center;gap:12px;font-size:13px;color:var(--muted);z-index:7;}
  .sync-prompt-lbl{flex:1 1 auto;}
  .sync-prompt button{border:none;background:none;color:var(--accent);font-weight:500;cursor:pointer;font-size:13px;font-family:inherit;padding:0;}
  .sync-prompt .sync-no{color:var(--muted);}

  .img-content{display:block;width:100%;height:auto;border-radius:0;}

  .link{display:flex;flex-direction:column;padding:10px;gap:8px;height:100%;box-sizing:border-box;overflow:hidden;}
  .link-media-slot{position:relative;flex:1 1 auto;min-height:120px;display:flex;flex-direction:column;overflow:hidden;cursor:pointer;background:#f1f3f5;}   /* the thumbnail / player area; click = play; the whole card still drags */
  .link-play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:56px;height:56px;border-radius:50%;pointer-events:none;   /* decorative — clicks pass through to the media slot */
    background:rgba(20,22,26,.72);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.35);z-index:2;}
  .link-media-slot:hover .link-play{background:var(--accent);}
  .link-play svg{width:26px;height:26px;margin-left:2px;}
  .link-ic-play{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2);transition:transform .12s,background .12s;}   /* audio / bare-file media: the leading icon IS the play button (inline, never over the text) */
  .link-ic-play:hover{background:#3b5bdb;transform:scale(1.08);}
  .link-ic-play svg{width:17px;height:17px;margin-left:2px;}
  .link.link-audiomode .link-row{gap:10px;}
  .link-embed{width:100%;flex:1 1 auto;min-height:150px;border:0;display:block;background:#000;}   /* fills the media slot; the row+title band stays below as the drag handle */
  .link-embed-audio{flex:0 0 auto;min-height:0;height:auto;background:transparent;width:100%;margin:auto 0;}
  .link-ttl-editing{outline:none;box-shadow:inset 0 0 0 2px var(--accent);border-radius:4px;cursor:text;}
  body.dragging .link-embed{pointer-events:none;}   /* while dragging any card, embeds go click-through so the pointer never gets trapped over an iframe/video and the move stays smooth */
  .link-url-input{width:100%;box-sizing:border-box;padding:12px;border:none;border-radius:6px;background:transparent;font-size:14px;color:var(--ink);outline:none;}
  .link-url-input::placeholder{color:var(--muted);}
  .link-url-input:focus{box-shadow:inset 0 0 0 2px var(--accent);}
  .link-img{display:block;width:100%;flex:1 1 auto;min-height:120px;object-fit:cover;background:#f1f3f5;border-radius:0;}   /* fills the card (covers) so a proportional resize stays clean */
  .link-row{display:flex;align-items:center;gap:8px;min-width:0;text-decoration:none;}
  .link-fav{width:18px;height:18px;flex:0 0 auto;border-radius:0;display:block;}
  .link-ic{flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .link-sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1 1 auto;}
  .link-ttl-link{font-size:14px;font-weight:600;color:#e8590c;text-decoration:underline;text-decoration-thickness:1px;word-break:break-word;line-height:1.3;cursor:pointer;}
  .link-ttl-link:hover{color:#d9480f;}
  .link-preview{display:flex;flex-direction:column;gap:8px;flex:1 1 auto;min-height:0;}                     /* the re-renderable preview (meta refresh never touches the description below) */

  .todo{padding:10px 10px 8px;display:flex;flex-direction:column;gap:4px;}
  .todo-item{display:flex;align-items:flex-start;gap:7px;}
  .todo-item input[type="checkbox"]{width:16px;height:16px;cursor:pointer;flex:0 0 auto;margin-top:4px;}
  .todo-text{flex:1 1 auto;border:none;background:transparent;font-size:var(--font-size,13px);font-family:inherit;padding:3px 2px;outline:none;border-bottom:1px solid transparent;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);resize:none;overflow:hidden;line-height:1.4;pointer-events:none;}
  .editing .todo-text{pointer-events:auto;}             /* first click selects the card; double-click enters edit (works for nested column items too) */
  .todo-text:focus{border-bottom-color:var(--line);}
  .todo-item.done .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-del{opacity:0;border:none;background:none;color:var(--muted);cursor:pointer;font-size:15px;line-height:1;margin-top:2px;}
  .todo-item:hover .todo-del{opacity:1;}
  .todo-title{width:100%;border:none;background:transparent;font-family:inherit;font-size:16px;font-weight:600;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);padding:2px 2px 5px;margin-bottom:2px;outline:none;pointer-events:none;}
  .editing .todo-title{pointer-events:auto;}            /* select-first: title editable only after the card is in edit mode (double-click) */
  .todo-title:focus{border-bottom:1px solid var(--line);}
  .todo-ask{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:7px;padding-top:5px;font-size:13px;color:var(--muted);}
  .todo-ask button{border:none;background:none;padding:0;color:#6b7280;cursor:pointer;font-size:13px;font-family:inherit;text-decoration:underline;}
  .todo-ask button:hover{color:var(--accent);}

  .card-board{background:transparent;border:none;box-shadow:none;}                  /* frameless board card (Milanote style) */
  .card-board:hover{background:rgba(0,0,0,.025);}
  .boardcard{display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 12px;}
  .boardcard-cover{width:76px;height:76px;flex:0 0 auto;border:none;border-radius:18px;background:#d3d8df;font-size:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:0;pointer-events:none;}   /* first click selects the board; rename/icon from the bottom bar */
  .boardcard-cover img{width:100%;height:100%;object-fit:cover;}
  .boardcard-cover:hover{filter:brightness(.96);}
  .boardcard-name{width:100%;border:none;background:transparent;font-size:var(--font-size,18px);font-weight:600;font-family:inherit;outline:none;min-width:40px;min-height:1.3em;color:var(--font-color,#2b2f36);text-align:center;pointer-events:none;white-space:normal;word-break:break-word;overflow-wrap:anywhere;}
  .card-board.editing .boardcard-name{pointer-events:auto;cursor:text;}   /* after Rename: click inside to position the caret / select text */
  .boardcard-stats{background:transparent;font-size:12px;color:var(--muted);text-align:center;}
  .boardcard-text{display:flex;flex-direction:column;align-items:center;gap:2px;width:100%;min-width:0;}
  /* a board dropped inside a column renders as a horizontal chip: icon left, name+stats right (Milanote list style) */
  .col-item .boardcard{flex-direction:row;align-items:center;gap:14px;padding:12px 14px;background:#f1f3f5;}
  .col-item .boardcard-text{align-items:flex-start;flex:1 1 auto;}
  .col-item .boardcard-name{text-align:left;}
  .col-item .boardcard-stats{text-align:left;}
  .cover-pop{position:fixed;z-index:70;background:#fff;border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow);padding:8px;width:252px;}   /* (1.88.0) widened 216->252 so the 8-wide icon grid sits fully inside the box; z-index > #propBar(60) so the picker is never hidden behind the bottom bar */
  .cover-emos{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px;}
  .cover-emos button{border:none;background:none;cursor:pointer;font-size:18px;padding:3px;border-radius:6px;}
  .cover-emos button:hover{background:#f0f2f5;}
  .cover-up{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;font-size:12px;padding:6px 8px;border-radius:6px;color:var(--ink);font-family:inherit;}
  .cover-up:hover{background:#f0f2f5;}
  /* (1.85.0) icon picker + (1.86.0) mind-map topic badge (note/todo/column badges removed in 1.86.0) */
  .mm-badge{position:absolute;width:36px;height:36px;z-index:4;pointer-events:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.28));}                          /* marker at the LEFT edge of a mind-map topic, vertically centred (placed inline in mmBuildInner, 2× size per Bob 1.86.0) */
  .cover-icons{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;margin:2px 0 6px;padding-top:6px;border-top:1px solid var(--line);}                  /* (1.88.0) 8-wide so all 30 icons pack into 4 tidy rows inside the widened popup */
  .cover-icons button{border:none;background:none;cursor:pointer;padding:2px;border-radius:6px;display:flex;align-items:center;justify-content:center;}
  .cover-icons button:hover{background:#f0f2f5;}
  .cover-icons img{width:22px;height:22px;display:block;}
  .icon-pick-pop{width:270px;}
  .icon-pick-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;max-height:248px;overflow:auto;}
  .icon-pick-none{grid-column:1/-1;text-align:left;border:none;background:none;cursor:pointer;font-size:12px;padding:6px 8px;border-radius:6px;color:var(--ink);font-family:inherit;}
  .icon-pick-none:hover{background:#f0f2f5;}
  .icon-pick-none.on{background:#eef4ff;}
  .icon-pick-cell{border:1.5px solid transparent;background:none;cursor:pointer;padding:4px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
  .icon-pick-cell:hover{background:#f0f2f5;}
  .icon-pick-cell.on{border-color:var(--accent);background:#eef4ff;}
  .icon-pick-cell img{width:30px;height:30px;display:block;}

  /* shapes */
  .card-shape{background:transparent !important;border:none !important;box-shadow:none !important;}
  .shape{position:relative;width:100%;height:100%;}
  .col-item .shape{height:auto;aspect-ratio:var(--sh-ar,16/10);}   /* KEPT after the 2.2.3 shape-in-column BAN: shapes nested while 2.2.1-2.2.2 were live must not regress to the collapsed render; new entry is blocked at all three gates */   /* (2.2.1, Bob's report "Shape into Column 没有用") a nested shape had NO height contract (c.h only applies to free cards) and rendered collapsed/degenerate — it always COULD be dropped in; it just looked broken. --sh-ar is stamped per item from the card's own w/h */
  .shape svg{display:block;width:100%;height:100%;overflow:visible;}
  .shape svg .sh{fill:var(--sh-fill, var(--card-color));fill-opacity:var(--sh-fill-op,1);stroke:var(--sh-stroke,rgba(20,24,34,.65));stroke-width:var(--sh-strokew,1.5);stroke-dasharray:var(--sh-dash,0);}   /* Fill + Outline are CSS-var driven; the fallbacks reproduce the classic look (solid fill, dark 1.5px outline) for shapes with no format fields set */
  .shape svg .sh-line{fill:none;stroke:var(--card-color);stroke-width:var(--line-w,4);stroke-dasharray:var(--line-dash,0);}
  .shape svg .sh-head{fill:var(--card-color);}
  .card-shape.selected{outline:2px solid var(--accent);outline-offset:4px;border-radius:0;}

  /* shape palette popover */
  .shape-pop{position:fixed;display:none;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:8px;z-index:70;grid-template-columns:repeat(3,1fr);gap:6px;}   /* z-index > #propBar(60) so the shape picker is never hidden behind the bottom bar */
  .shape-pop.show{display:grid;}
  /* dropdown menu (Insert) */
  /* search / trash side panels */
  .side-panel{position:fixed;right:14px;top:96px;width:320px;max-height:70vh;display:none;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:48;overflow:hidden;}
  .side-panel.show{display:flex;}
  /* Board structure (folder tree) pop-out */
  .tree-panel{position:fixed;left:80px;top:96px;width:300px;max-height:74vh;display:none;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);z-index:65;overflow:hidden;}
  .tree-panel.show{display:flex;}
  .tree-head{padding:9px 12px 9px 14px;font-weight:600;font-size:13px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;color:var(--ink);}
  .tree-head .tp-close{border:none;background:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 5px;border-radius:6px;}
  .tree-head .tp-close:hover{background:#f0f2f5;}
  .board-tree{overflow:auto;padding:6px;}
  .bt-row{display:flex;align-items:center;gap:8px;width:100%;border:none;background:none;cursor:pointer;font-size:13px;color:var(--ink);font-family:inherit;text-align:left;padding:6px 8px;border-radius:7px;white-space:nowrap;}
  .bt-row:hover{background:#f1f3f5;}
  .bt-row.here{background:var(--accent-soft);color:var(--accent);font-weight:600;}
  .bt-ic{flex:0 0 auto;font-size:13px;line-height:1;}
  .bt-nm{overflow:hidden;text-overflow:ellipsis;}
  .sp-head{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--line);}
  .sp-head input{flex:1 1 auto;border:1px solid var(--line);border-radius:7px;padding:7px 9px;font-size:13px;font-family:inherit;outline:none;}
  .sp-head b{flex:1 1 auto;font-size:14px;}
  .sp-close{border:none;background:none;cursor:pointer;font-size:15px;color:var(--muted);padding:2px 6px;}
  #searchResults{overflow-y:auto;padding:6px;}
  .sr-item{display:block;width:100%;text-align:left;border:none;background:none;cursor:pointer;padding:8px 10px;border-radius:8px;font-family:inherit;}
  .sr-item:hover{background:#f0f2f5;}
  .sr-snip{font-size:13px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sr-board{font-size:11px;color:var(--muted);margin-top:2px;}
  .sr-empty{font-size:12px;color:var(--muted);padding:14px;text-align:center;}
  .shape-pick{width:54px;height:46px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:grab;display:flex;align-items:center;justify-content:center;padding:7px;}
  .shape-pick:hover{background:#f0f2f5;border-color:#c8cdd5;}
  .shape-pick svg{width:100%;height:100%;overflow:visible;}
  .shape-pick .sh{fill:#cfe3ff;stroke:#5b7fb5;stroke-width:3;}
  .shape-pick .sh-line{fill:none;stroke:#5b7fb5;}
  .shape-pick .sh-head{fill:#5b7fb5;}

  /* bottom properties bar (per-object operations) */
  #propBar{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:7px 12px;padding-bottom:calc(7px + env(safe-area-inset-bottom,0px));background:var(--panel);border-top:1px solid var(--line);min-height:48px;overflow-x:auto;overflow-y:hidden;position:relative;z-index:60;}   /* safe-area: clears the iPhone/iPad home indicator (viewport-fit=cover); z-index so the keyboard-lift floats it over the canvas */
  .prop-chip{font-size:12px;font-weight:600;color:#495057;background:#f1f3f5;padding:5px 11px;border-radius:20px;white-space:nowrap;flex:0 0 auto;}
  .prop-colors{display:flex;align-items:center;gap:4px;overflow-x:auto;flex:1 1 auto;padding:3px 0;}
  .prop-sw{width:18px;height:18px;border-radius:5px;border:1px solid rgba(0,0,0,.18);cursor:pointer;flex:0 0 auto;padding:0;transition:transform .1s;}
  .prop-sw.active{outline:2px solid var(--accent);outline-offset:1px;}
  .prop-sw:hover{transform:scale(1.18);}
  .prop-actions{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .prop-actions.fill{flex:1 1 auto;}                     /* Link/Upload: fill the bar so the layer/trash icons pin to the far right */
  .prop-linebar{display:inline-flex;align-items:center;gap:6px;flex:0 0 auto;width:232px;}   /* a selected line's style button + its type sub-control (corners / bend / angle) in a FIXED-width box, so switching line type never moves the dir / dashed / width / delete buttons after it */
  .prop-btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;line-height:1;color:var(--ink);white-space:nowrap;}
  .prop-url{border:1px solid var(--line);border-radius:7px;padding:6px 9px;font-size:13px;font-family:inherit;color:var(--ink);outline:none;min-width:240px;flex:1 1 auto;}
  .prop-url:focus{border-color:var(--accent);}
  .prop-btn:hover{background:#f0f2f5;}
  .prop-btn.on{background:var(--accent-soft);border-color:var(--accent);}
  .prop-btn.danger{color:#e03131;}
  .prop-btn.danger:hover{background:#ffe3e3;border-color:#ffa8a8;}
  .prop-btn.prop-icon{padding:1.5px 8px;display:inline-flex;align-items:center;justify-content:center;}
  .prop-btn.prop-icon svg{width:22px;height:22px;display:block;}   /* 22px glyph in 1.5px padding + 1px border = 27px button — exactly matches the text buttons (13px line + 6px×2 padding + 1px border), so the bar stays aligned */
  .prop-fontsize{font-size:12px;font-weight:500;color:#5b626d;min-width:36px;text-align:center;flex:0 0 auto;}
  .prop-empty{font-size:12px;color:var(--muted);flex:1 1 auto;}
  .prop-fc-btn,.prop-oc-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 9px;line-height:1;flex:0 0 auto;}   /* font-colour + shape-outline-colour toggles share one look */
  .prop-fc-btn .fc-a{font-size:13px;font-weight:700;}
  .prop-fc-btn .fc-bar,.prop-oc-btn .oc-bar{width:16px;height:3px;border-radius:2px;border:1px solid rgba(0,0,0,.18);}
  .prop-oc-btn .oc-o{font-size:12px;font-weight:700;}
  /* (1.87.0) mind-map Line-colour toggle (Line over a R/Y/B bar) + Shape style button (the word "Shape" wearing the style) */
  .prop-line-btn{display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:4px 9px;line-height:1;flex:0 0 auto;}
  .prop-line-btn .ln-lbl{font-size:11px;font-weight:700;}
  .prop-line-btn .ln-bar{width:18px;height:3px;border-radius:2px;border:1px solid rgba(0,0,0,.18);background:linear-gradient(90deg,#f03e3e 0 33%,#f59f00 33% 66%,#4c6ef5 66% 100%);}
  .prop-shape-btn{padding:4px 8px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;}
  .prop-shape-btn .shape-demo{font-size:11px;line-height:1.25;padding:1px 4px;color:var(--ink);}
  .prop-shape-btn .shape-demo.shape-underline{border-bottom:2px solid currentColor;}
  .prop-shape-btn .shape-demo.shape-box{border:1.5px solid currentColor;border-radius:3px;}
  .prop-shape-btn .shape-demo.shape-dashed{border:1.5px dashed currentColor;border-radius:3px;}
  .prop-colors.font-target{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;background:var(--accent-soft);}
  .prop-align{display:inline-flex;gap:2px;flex:0 0 auto;}
  .align-btn{padding:5px 7px;display:inline-flex;align-items:center;justify-content:center;}
  .align-btn.on{color:var(--accent);background:var(--accent-soft);border-color:var(--accent);}

  /* file shortcut card — frameless, small icon (Milanote-style) */
  .card-file{background:transparent;border:none;box-shadow:none;}
  .card-file:hover{background:rgba(0,0,0,.025);}
  .filecard{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;}
  .file-thumb{flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .file-thumb .fic{width:31px;height:auto;display:block;filter:drop-shadow(0 1px 2px rgba(15,23,42,.12));}
  .file-thumb img{width:31px;height:31px;object-fit:cover;border-radius:4px;}
  .file-name{font-size:16px;font-weight:600;text-align:center;word-break:break-word;line-height:1.3;color:var(--ink);}
  .file-size{font-size:12px;color:var(--muted);text-align:center;}
  .filecard.broken .file-thumb{opacity:.4;filter:grayscale(1);}
  .filecard.broken .file-name{color:#e03131;text-decoration:line-through;}
  .file-relink{margin-top:2px;font-size:11px;color:#e03131;background:#fff5f5;border:1px solid #ffc9c9;border-radius:6px;padding:3px 9px;cursor:pointer;font-family:inherit;pointer-events:auto;}
  .file-relink:hover{background:#ffe3e3;}
  /* (2.2.1, Bob's request) files inside a COLUMN collapse to a compact row: [icon] name.ext [size] [☁] — the free-card layout stays vertical */
  .col-item .filecard{flex-direction:row;align-items:center;gap:10px;padding:9px 12px;}
  .col-item .file-thumb .fic{width:22px;}
  .col-item .file-thumb img{width:22px;height:22px;}
  .col-item .file-name{flex:1 1 auto;min-width:0;text-align:left;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25;}   /* text-overflow backstop: if the width-weighted midTruncate still overflows (fonts vary), clip visibly instead of silently */
  .col-item .file-size{flex:0 0 auto;font-size:11px;}
  .col-item .file-badge{flex:0 0 auto;font-size:12px;opacity:.6;}

  /* column (Kanban container) */
  .column{display:flex;flex-direction:column;gap:6px;padding:8px;}
  .col-head{display:flex;align-items:center;gap:6px;}
  .col-toggle{border:none;background:none;cursor:pointer;font-size:22px;line-height:1;color:var(--muted);padding:2px 6px;border-radius:6px;}   /* 4× the old 11px button — an easy click/tap target (fits the 30px header row) */
  .col-toggle:hover{background:#eef1f4;color:var(--ink);}
  .col-title{flex:1 1 auto;border:none;background:transparent;font-weight:600;font-size:var(--font-size,18px);font-family:inherit;outline:none;min-width:30px;min-height:30px;line-height:30px;color:var(--font-color,#2b2f36);text-align:var(--text-align,left);pointer-events:none;}   /* roomy header (≈24px-font height) while the font stays 18px */
  .editing .col-title{pointer-events:auto;}
  .col-count{flex:0 0 auto;font-size:11px;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:10px;padding:1px 7px;}
  .col-body{display:flex;flex-direction:column;gap:6px;}
  .col-empty{min-height:104px;background:rgba(15,23,42,.045);border-radius:0;}   /* drop area shown while a column has no cards */
  .col-item{display:flex;align-items:stretch;background:var(--card-color,#fff);border:1px solid var(--line);border-radius:0;overflow:hidden;}
  .col-item-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;box-shadow:0 8px 22px rgba(15,23,42,.22);transform:rotate(1.5deg);}
  .col-item-content{flex:1 1 auto;min-width:0;--font-size:initial;--font-color:initial;--text-align:initial;pointer-events:none;}   /* items inert until the column is selected (select-the-column-first) */
  .card-column.selected .col-item-content{pointer-events:auto;}
  /* column drop-insertion indicator */
  .col-item.drop-above{box-shadow:0 -3px 0 -1px var(--accent);}
  .col-item.drop-below{box-shadow:0 3px 0 -1px var(--accent);}
  /* (1.92.0) compact mind-map inside a column: icon + a Central-Topic box, auto-height */
  .mm-col-mini{display:flex;align-items:center;gap:10px;padding:8px 10px;min-width:0;color:var(--ink);}
  .mm-col-ic{flex:0 0 auto;display:inline-flex;}
  .mm-col-ic svg{width:30px;height:30px;display:block;}
  .mm-col-topic{flex:1 1 auto;min-width:0;border:1px solid var(--line);border-radius:8px;padding:6px 10px;background:#fff;font-weight:600;font-size:14px;line-height:1.35;white-space:normal;overflow-wrap:anywhere;}
  .mm-col-topic.mm-col-empty{color:var(--muted);font-weight:400;}
  .mm-col-topic .xlink{font-weight:600;}
  .col-body.col-insert-empty{outline:2px dashed var(--accent);outline-offset:2px;border-radius:0;min-height:26px;}
  .col-head.col-insert-empty{outline:2px dashed var(--accent);outline-offset:3px;border-radius:0;}

  /* audio / video objects */
  .media{padding:8px;display:flex;flex-direction:column;gap:6px;}
  .media audio{width:100%;display:block;}
  .media video{width:100%;display:block;border-radius:0;background:#000;}
  .media-name{font-size:11px;color:var(--muted);text-align:center;word-break:break-word;}
  .media-missing{padding:16px 10px;text-align:center;font-size:13px;color:var(--muted);background:#f1f3f5;border-radius:0;}

  /* card handles */
  .handle{position:absolute;}
  .handle-resize{right:-5px;bottom:-5px;width:14px;height:14px;border:2px solid var(--accent);background:#fff;border-radius:4px;cursor:nwse-resize;display:none;}
  .card-column .handle-resize,.card-todo .handle-resize{cursor:ew-resize;}   /* width-only resize (height auto) */
  .card.selected .handle-resize{display:block;}
  /* PPT-style rotation handle (shapes + images) */
  .rotate-handle{position:absolute;top:-30px;left:50%;margin-left:-8px;width:16px;height:16px;border-radius:50%;border:2px solid var(--accent);background:#fff;cursor:grab;display:none;box-shadow:0 1px 3px rgba(0,0,0,.25);z-index:7;}
  .rotate-handle::before{content:"";position:absolute;left:50%;top:14px;width:2px;height:16px;background:var(--accent);margin-left:-1px;}
  .card-shape.selected .rotate-handle,.card-image.selected .rotate-handle{display:block;}
  .handle-resize{z-index:8;}
  /* Connector mode: drag from one card/shape to another to link them */
  body.connect-mode #viewport,body.connect-mode #cardsLayer,body.connect-mode .card{cursor:crosshair;}
  /* draggable endpoint handles for a selected connector */
  .ep-handle{fill:#fff;stroke:var(--accent);stroke-width:2.5;pointer-events:auto;cursor:grab;}
  .mid-handle{fill:var(--accent-soft);}                          /* curve bend point */
  .wp-handle{fill:var(--accent-soft);stroke:var(--accent);cursor:grab;}   /* right-angle turn point (square, to echo the 90° theme) */
  .conn-pt{fill:#fff;stroke:var(--accent);stroke-width:2;}        /* connection points shown while wiring */
  .conn-pt.near{fill:var(--accent);}
  .ep-handle:hover{fill:var(--accent-soft);}


  /* ---------- Modal ---------- */
  #overlay{position:fixed;inset:0;background:rgba(20,24,34,.32);display:none;align-items:center;justify-content:center;z-index:50;}
  #overlay.show{display:flex;}
  .modal{background:#fff;border-radius:14px;box-shadow:0 12px 50px rgba(0,0,0,.3);width:340px;padding:20px;}
  .modal h3{margin:0 0 14px;font-size:16px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field select{width:100%;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .hint-note{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;}

  .align-guide{position:absolute;background:#e8590c;pointer-events:none;z-index:19;display:none;}   /* smart alignment guide (PowerPoint-style) */
  .align-guide.align-v{top:0;bottom:0;width:1px;}
  .align-guide.align-h{left:0;right:0;height:1px;}

  /* ---------- Print ---------- */
  #print-root{display:none;}
  @media print{
    #app{display:none !important;}
    #overlay{display:none !important;}
    #print-root{display:block;}                              /* normal flow so each page tile lands on its own printed page */
    .print-page{page-break-inside:avoid;break-inside:avoid;}  /* one clipped canvas tile per printed page; break-after:page (set inline) starts the next tile fresh */
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .card{box-shadow:none !important;}
    body{background:#fff;}
  }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button class="brand" id="brandMenu" title="BobNote — Open · Board file · Print/PDF · Markdown · Assets · Pause sync · Disconnect · Forget"><span class="dot"></span>BobNote<span class="brand-caret">▾</span></button>
    <div id="breadcrumb"></div>
    <div class="spacer"></div>
    <div class="tool-group">
      <button class="btn icon" id="editToggle" title="Edit — switch on the editing tools"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 4.5l3 3L8 19l-4 1 1-4z"/><path d="M14.5 6.5l3 3"/></svg></button>
      <button class="btn icon" id="navBack" title="Back — previous view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg></button>
      <button class="btn icon" id="navFwd" title="Forward — next view"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
    </div>
    <div class="tool-group">
      <button class="btn icon" id="undoBtn" title="Undo (⌘Z / Ctrl+Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-1"/></svg></button>
      <button class="btn icon" id="redoBtn" title="Redo (⌘⇧Z / Ctrl+Y)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9a5 5 0 0 0 0 10h1"/></svg></button>
    </div>
    <div class="tool-group">
      <button class="btn icon" id="searchBtn" title="Search all boards (⌘F)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg></button>
      <button class="btn icon" id="dupBtn" title="Duplicate check — scan all boards for duplicated items"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2.8" width="12" height="15.4" rx="2.4"/><path d="M15.8 21.2H5.4A2.4 2.4 0 0 1 3 18.8V8.2"/><path d="M13.1 8.6c.35-.9 1.3-1.5 2.3-1.4 1.15.12 2 1.05 2 2.1 0 1.5-2 1.9-2 3.1"/><path d="M15.35 15.4h.01"/></svg></button>
      <button class="btn icon" id="treeBtn" title="Board structure — the folder tree of all boards"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="4.5" rx="1"/><rect x="3" y="16.5" width="6" height="4.5" rx="1"/><rect x="15" y="16.5" width="6" height="4.5" rx="1"/><path d="M12 7.5v6.5M6 16.5v-2.5h12v2.5"/></svg></button>
      <button class="btn icon" id="spellScanBtn" title="Check spelling on this board — underline suspected typos in text already written (right-click / long-press a typo for correction suggestions)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16"/><path d="M4 10h10"/><path d="M4 14h7"/><path d="M13.5 18l2.3 2.3L21 15"/></svg></button>
      <button class="btn icon" id="xlinkBtn" title="Cross-link — link to the selected card / board / file (copies to clipboard + drops a draggable Link in the Basket)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.07 0l2-2a5 5 0 0 0-7.07-7.07l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.07 0l-2 2a5 5 0 0 0 7.07 7.07l1.5-1.5"/></svg></button>
    </div>
    <div class="tool-group">
      <button class="btn icon" id="syncBtn" title="Sync — save this workspace to a file (e.g. in a OneDrive folder) that follows you across devices"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.4 18.5a4.3 4.3 0 0 1-.5-8.57 5.8 5.8 0 0 1 11.1.9A3.6 3.6 0 0 1 17.6 18.5Z"/><path d="M12 16.6v-6.1M9.6 12.4 12 10l2.4 2.4" stroke-width="1.8"/></svg></button>
      <button class="btn icon" id="odBtn" title="OneDrive — sign in to sync your boards across your Apple devices"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.4 18.5a4.3 4.3 0 0 1-.5-8.57 5.8 5.8 0 0 1 11.1.9A3.6 3.6 0 0 1 17.6 18.5Z"/><path class="cl-v" d="M9.3 13.9l1.9 1.9 3.6-3.9" stroke-width="1.8"/><path class="cl-x" d="M10.2 12.4l3.6 3.6M13.8 12.4l-3.6 3.6" stroke-width="1.8"/></svg></button>
    </div>
    <div class="tool-group zoomctl">
      <button class="btn" id="zoomOut">−</button><button class="btn" id="zoomLabel" title="Reset zoom to 100%">100%</button>
      <button class="btn" id="zoomIn">＋</button><button class="btn" id="zoomFit">Fit</button>
    </div>
    <div class="tool-group"><button class="btn icon" id="presentBtn" title="Present — full-screen, distraction-free walkthrough (← → to step, Esc to exit)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="1.6"/><path d="M12 17v3"/><path d="M8.5 20h7"/><path d="M10.5 8.5l4 2.5-4 2.5z" fill="currentColor" stroke="none"/></svg></button></div>
    <div class="tool-group"><button class="btn" id="basketTab" title="Basket — staged sources">🧺 Basket</button></div>
  </div>
  <div id="stage">
    <div id="leftbar">
      <button class="ltool" data-add="note" draggable="true" title="Drag onto the canvas to add"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5.5 4.5 H18.5 M5.5 12 H18.5 M5.5 19.5 H13.5"/></svg></span>Note</button>
      <button class="ltool" data-add="todo" draggable="true" title="Drag onto the canvas to add"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l1.6 1.6L7.5 5.7"/><path d="M11 7h9"/><path d="M3 15l1.6 1.6L7.5 13.7"/><path d="M11 15h9"/></svg></span>To-do</button>
      <button class="ltool" id="connectorBtn" title="Line / connector mode — drag from one card/shape to another to link them (Esc to exit)"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18L18 6"/><path d="M9 6h9v9"/></svg></span>Line</button>
      <button class="ltool" data-add="board" draggable="true" title="Drag onto the canvas to add"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="4" width="7" height="7" rx="1.6"/><rect x="13" y="4" width="7" height="7" rx="1.6"/><rect x="4" y="13" width="7" height="7" rx="1.6"/><rect x="13" y="13" width="7" height="7" rx="1.6"/></svg></span>Board</button>
      <button class="ltool" data-add="column" draggable="true" title="Column — drag cards in to stack them (Kanban). Drag onto the canvas to add."><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8.5V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v2.5Z" fill="#e03131" stroke="none"/><rect x="5" y="4" width="14" height="16" rx="2"/><path d="M5 8.5h14"/><path d="M8.5 12.5h7M8.5 16h7" stroke-width="1.7"/></svg></span>Column</button>
      <button class="ltool" data-add="table" draggable="true" title="Table — editable grid. Drag onto the canvas to add."><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M4 10h16M12 5v14" stroke-linecap="round"/></svg></span>Table</button>
      <button class="ltool" data-add="mindmap" draggable="true" title="Mind Map — one card holding a whole mind map (Tab = child, Enter = sibling). Drag onto the canvas to add."><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 21c0-2.6 1.8-4 4-4.3M14.5 16.7c1.4.5 2.5 1.9 2.5 4.3"/><circle cx="11.4" cy="12" r="3.1"/><path d="M11.4 8.9V6.6"/><circle cx="11.4" cy="5.2" r="1.35"/><path d="M9.3 9.9 7.6 8.2"/><circle cx="6.6" cy="7.2" r="1.35"/><path d="M13.5 9.9 15.2 8.2"/><circle cx="16.2" cy="7.2" r="1.35"/></svg></span>Mind Map</button>
      <button class="ltool" id="shapeBtn" title="Shapes"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3.5" y="3.5" width="11" height="11" rx="1.8"/><circle cx="16" cy="16" r="5"/></svg></span>Shape</button>
      <button class="ltool" data-add="link" draggable="true" title="Hyperlink — drag onto the canvas to add"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.1 15.9l7.8 -7.8"/><path d="M10.7 4.2l.6 -.7a6.5 6.5 0 0 1 9.19 9.19l-.69 .6"/><path d="M13.3 19.8l-.52 .69a6.59 6.59 0 0 1 -9.27 0a6.46 6.46 0 0 1 0 -9.19l.68 -.6"/></svg></span>Link</button>
      <button class="ltool" data-add="sketch" draggable="true" title="Draw — opens the full-window drawing editor (click). Drag onto the canvas for a small draw card."><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 4.5l3 3L9 18l-4 1 1-4z"/><path d="M14.5 6.5l3 3"/></svg></span>Draw</button>
      <button class="ltool" id="annotateBtn" title="Annotate — draw over the whole board on a see-through sheet (click again to finish)"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="butt" stroke-linejoin="miter"><path d="M13 3 L2.6 3 L2.6 19 L8 19 L11.3 22.6 L14.6 19 L19.4 19 L19.4 11"/><path d="M18.4 2.7 L21.3 5.6 L12.2 14.7 L8.9 15.6 L9.8 12.3 Z" fill="currentColor" stroke="currentColor" stroke-width="1.1" stroke-linejoin="miter"/></svg></span>Annotate</button>
      <button class="ltool" id="localFileBtn" title="Files — add a file to the board as a card (its link, or a copy): pick from Finder (multi-select), or drag files straight onto the board"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3H18V21H8.5L6 18.5Z"/><path d="M6 18.5H8.5V21"/><path d="M11.2 10.5V4a1.6 1.6 0 0 1 3.2 0v7.6a2.7 2.7 0 0 1-5.4 0V5.4"/></svg></span>Files</button>
      <div class="lt-spacer"></div>
      <button class="ltool lt-reserved" type="button" title="Reserved — a future tool will go here"><span class="lt-ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 7v10M7 12h10"/></svg></span></button>
    </div>
    <div id="center">
      <div id="viewport">
        <div id="world">
          <svg id="drawSvg" width="10" height="10"><g id="drawLines"></g></svg>
          <svg id="arrowSvg" width="10" height="10"><defs></defs><g id="arrowLines"></g><g id="tempLine"></g></svg>
          <div id="cardsLayer" spellcheck="true"></div>
          <svg id="overlaySvg" width="10" height="10"><g id="connPts"></g><g id="epHandles"></g></svg>
        </div>
      </div>
    </div>
    <div id="basket">
      <div class="basket-head"><b>Basket</b><button class="prop-btn" id="basketAdd" title="Add a link or file path">＋</button></div>
      <div id="basketList"></div>
      <div class="basket-empty">Drop files here to stash sources, then drag them onto the canvas.</div>
    </div>
  </div>
  <div id="propBar"></div>
</div>

<div id="shapePop" class="shape-pop"></div><div id="marquee"></div>
<button id="quickCap" title="Quick note — capture now, arrange later on the Mac/iPad">＋</button>
<div id="dupModal"><div class="dup-box"><div class="dup-head">Duplicate check<span class="dup-count" id="dupCount"></span><button class="dup-close" id="dupClose" title="Close">✕</button></div><div class="dup-list" id="dupList"></div></div></div>
<div id="searchPanel" class="side-panel">
  <div class="sp-head"><input id="searchInput" placeholder="Search all boards…" /><button class="sp-close" id="searchClose">✕</button></div>
  <div id="searchResults"></div>
</div>

<div id="boardTreePanel" class="tree-panel">
  <div class="tree-head"><span>Board structure</span><button class="tp-close" id="treeClose" title="Close">✕</button></div>
  <div id="boardTree" class="board-tree"></div>
</div>

<!-- Print render target — buildPrint() fills this with one .print-page tile per printed page -->
<div id="print-root"></div>

<!-- PDF modal -->
<div id="overlay">
  <div class="modal">
    <h3>Export to PDF</h3>
    <div class="field">
      <label>Print scope</label>
      <select id="pdf-scope">
        <option value="fit" selected>Fit all into one page</option>
        <option value="window">Current window (what's on screen)</option>
        <option value="width">One page wide (height flows across pages)</option>
        <option value="height">One page tall (width flows across pages)</option>
      </select>
    </div>
    <div class="field">
      <label>Paper size</label>
      <select id="pdf-size">
        <option value="A4">A4 (210 × 297 mm)</option>
        <option value="A3" selected>A3 (297 × 420 mm)</option>
        <option value="A2">A2 (420 × 594 mm)</option>
        <option value="A1">A1 (594 × 841 mm)</option>
      </select>
    </div>
    <div class="field">
      <label>Orientation</label>
      <select id="pdf-orient">
        <option value="landscape" selected>Landscape</option>
        <option value="portrait">Portrait</option>
      </select>
    </div>
    <p class="hint-note">In the print dialog choose <b>Save as PDF</b> as the destination and keep the margins as set. The two "one page wide/tall" modes flow the rest of the board across extra pages.</p>
    <div class="modal-actions">
      <button class="btn" id="pdf-cancel">Cancel</button>
      <button class="btn primary" id="pdf-go">Save as PDF</button>
    </div>
  </div>
</div>

<input type="file" id="openInput" accept="application/json,.json" style="display:none" />
