<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' data: blob: file: http: https:; media-src 'self' data: blob: file: http: https:; connect-src 'self' https://login.microsoftonline.com https://graph.microsoft.com https://*.1drv.com https://*.microsoftpersonalcontent.com https://*.sharepoint.com https://*.storage.live.com https://api.microlink.io https://noembed.com; frame-src https://www.youtube-nocookie.com; object-src 'none'; base-uri 'none'; form-action 'none';" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="BobNote" />
<meta name="theme-color" content="#f4f5f7" />
<link rel="apple-touch-icon" href="icon.png" />
<title>BobNote</title>
<style>
  :root{
    --bg:#f4f5f7;
    --panel:#ffffff;
    --line:#e3e6ea;
    --ink:#2b2f36;
    --muted:#6b7280;
    --accent:#4c6ef5;
    --accent-soft:#dbe4ff;
    --shadow:0 1px 3px rgba(20,24,34,.12),0 6px 18px rgba(20,24,34,.10);
    --lift-shadow:0 14px 32px rgba(20,24,34,.24),0 5px 12px rgba(20,24,34,.16);   /* floating shadow shown only while a card is being dragged */
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); overflow:hidden;
  }

  /* ---------- App chrome ---------- */
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}   /* dvh tracks the REAL visible height on iPhone/iPad (100vh hides the bottom bar behind Safari's chrome); the vh line is the fallback for old browsers */
  #topbar{
    display:flex;align-items:center;gap:10px;
    padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--line);
    box-shadow:0 1px 0 rgba(0,0,0,.02);z-index:30;flex:0 0 auto;
  }
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px;margin-right:4px;display:flex;align-items:center;gap:6px;font-family:inherit;color:var(--ink,#2b2f36);border:1px solid transparent;background:none;cursor:pointer;padding:3px 7px;border-radius:8px;}
  .brand:hover{background:var(--hover,#f1f3f5);border-color:var(--line,#e3e6ea);}
  .brand .dot{width:10px;height:10px;border-radius:3px;background:var(--accent);display:inline-block;}
  .brand-caret{font-size:10px;opacity:.55;margin-left:1px;}
  .tool-group{display:flex;align-items:center;gap:4px;padding:0 6px;border-left:1px solid var(--line);}
  .tool-group:first-of-type{border-left:none;}
  button.btn{
    border:1px solid var(--line);background:#fff;color:var(--ink);
    padding:6px 10px;border-radius:8px;font-size:13px;cursor:pointer;line-height:1;
    display:inline-flex;align-items:center;gap:6px;transition:.12s;
  }
  button.btn:hover{background:#f0f2f5;border-color:#d3d8df;}
  button.btn.primary,button.btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  button.btn.primary:hover,button.btn.active:hover{background:#3b5bdb;}
  button.btn:disabled{opacity:.4;cursor:default;background:#fff;}
  button.btn.icon{padding:4px;justify-content:center;}
  button.btn.icon svg{width:22px;height:22px;display:block;}   /* larger icon fill; padding trimmed so the button stays the same size */
  #syncBtn.sync-on,#odBtn.sync-on{color:#2f9e44;}          /* green = connected + saving */
  #syncBtn.sync-reconnect,#odBtn.sync-reconnect{color:#e8a13b;}   /* amber = remembered, click to reconnect / sign in */
  #syncBtn.sync-err,#odBtn.sync-err{color:#e03131;}       /* red = last write failed */
  /* --- OneDrive soft-lock cloud states (only one device syncs at a time) --- */
  #odBtn{position:relative;}                               /* anchor the unsynced-edits badge */
  #odBtn .cl-v,#odBtn .cl-x{display:none;}                 /* the inner mark is chosen by state */
  #odBtn.od-active{color:#2f9e44;} #odBtn.od-active .cl-v{display:inline;}      /* GREEN ✓ = this device is the active syncer (writing) */
  #odBtn.od-passive{color:#e8820e;} #odBtn.od-passive .cl-x{display:inline;}    /* AMBER solid ✗ = passive reader; tap to take over */
  #odBtn.od-dirty{color:#e8820e;} #odBtn.od-dirty .cl-x{display:inline;}        /* AMBER solid ✗ = View only WITH unsynced edits here — solid (not a flash: flashing now means "connecting") + a badge dot */
  #odBtn.od-dirty::after{content:'';position:absolute;top:2px;right:2px;width:7px;height:7px;border-radius:50%;background:#e8590c;box-shadow:0 0 0 1.5px var(--panel,#fff);}  /* the "you have changes here not saved to the cloud" badge */
  #odBtn.od-offline{color:#e03131;} #odBtn.od-offline .cl-x{display:inline;}    /* RED ✗ = unlinked (offline / signed out / error); tap to reconnect */
  #odBtn.od-acquiring{color:#e8820e;animation:od-pulse 1s ease-in-out infinite;} /* amber pulse = transient busy (connecting… / taking over…) */
  @keyframes od-pulse{0%,100%{opacity:1;} 50%{opacity:.35;}}
  /* --- Sync status panel (1.74.0): ⌥/right-click/long-press the cloud -> a visible "why is it red?" view --- */
  .sync-panel{ position:fixed; top:52px; right:12px; z-index:600; width:320px; max-width:calc(100vw - 24px); max-height:calc(100vh - 72px); overflow:auto; background:var(--panel,#fff); color:var(--ink,#2b2f36); border:1px solid var(--line,#e3e6ea); border-radius:12px; box-shadow:0 10px 40px rgba(0,0,0,.22); padding:12px 12px 10px; font-size:13px; }
  .sync-panel .sp-head{ display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .sync-panel .sp-dot{ width:11px; height:11px; border-radius:50%; flex:none; box-shadow:0 0 0 3px rgba(0,0,0,.05); }
  .sync-panel .sp-head b{ font-size:14px; }
  .sync-panel .sp-x{ margin-left:auto; border:none; background:none; cursor:pointer; font-size:15px; color:var(--muted,#8a9099); padding:2px 6px; border-radius:6px; }
  .sync-panel .sp-x:hover{ background:rgba(0,0,0,.06); }
  .sync-panel .sp-reason{ background:rgba(76,110,245,.08); border-radius:8px; padding:7px 9px; margin-bottom:9px; line-height:1.35; }
  .sync-panel .sp-grid{ display:grid; grid-template-columns:auto 1fr; gap:3px 12px; margin-bottom:9px; }
  .sync-panel .sp-k{ color:var(--muted,#8a9099); white-space:nowrap; }
  .sync-panel .sp-v{ text-align:right; word-break:break-word; font-variant-numeric:tabular-nums; }
  .sync-panel .sp-logh{ color:var(--muted,#8a9099); font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px; }
  .sync-panel .sp-log{ margin:0 0 10px; max-height:132px; overflow:auto; background:var(--bg,#f4f5f7); border-radius:7px; padding:7px 8px; font:11px/1.5 ui-monospace,Menlo,monospace; white-space:pre; }
  .sync-panel .sp-btns{ display:flex; flex-direction:column; gap:6px; }
  .sync-panel .sp-note{ color:var(--muted,#6b7280); font-size:11.5px; line-height:1.35; text-align:center; padding:4px 2px 0; }
  .sync-panel .sp-b{ border:1px solid var(--line,#e3e6ea); background:var(--bg,#f4f5f7); color:var(--ink,#2b2f36); border-radius:8px; padding:8px 10px; cursor:pointer; font:inherit; text-align:center; }
  .sync-panel .sp-b:hover{ background:rgba(0,0,0,.05); }
  .sync-panel .sp-b-primary{ background:var(--accent,#4c6ef5); border-color:var(--accent,#4c6ef5); color:#fff; font-weight:600; }
  .sync-panel .sp-b-primary:hover{ filter:brightness(1.06); background:var(--accent,#4c6ef5); }
  .sync-panel .sp-b-danger{ color:#e03131; }
  .sync-panel .sp-b-danger:hover{ background:rgba(224,49,49,.09); }
  .sync-panel .sp-status{ margin-top:8px; min-height:1em; color:var(--muted,#6b7280); font-size:12px; line-height:1.35; white-space:pre-wrap; }
  .sync-panel .sp-status:empty{ margin-top:0; min-height:0; }
  /* --- Single-active-tab overlay (1.77.0): a later tab in the same browser is paused behind this --- */
  .tab-lock{ position:fixed; inset:0; z-index:9000; background:rgba(20,24,30,.72); display:flex; align-items:center; justify-content:center; }
  @supports (backdrop-filter:blur(3px)){ .tab-lock{ backdrop-filter:blur(3px); } }
  .tab-lock-card{ background:var(--panel,#fff); color:var(--ink,#2b2f36); max-width:360px; margin:20px; padding:24px 22px 20px; border-radius:14px; box-shadow:0 16px 50px rgba(0,0,0,.42); text-align:center; }
  .tab-lock-h{ font-size:17px; font-weight:600; margin-bottom:8px; }
  .tab-lock-p{ font-size:13px; line-height:1.55; color:var(--muted,#6b7280); margin:0 0 16px; }
  .tab-lock-btn{ border:1px solid var(--accent,#4c6ef5); background:var(--accent,#4c6ef5); color:#fff; font:inherit; font-weight:600; padding:10px 18px; border-radius:9px; cursor:pointer; }
  .tab-lock-btn:hover{ filter:brightness(1.06); }
  .tab-lock-btn:disabled{ opacity:.6; cursor:default; }
  /* magnetic drop target highlight while connecting / re-attaching */
  .card.drop-target{outline:3px solid var(--accent) !important;outline-offset:3px;box-shadow:0 0 0 6px var(--accent-soft);}
  /* marquee (rubber-band) selection box */
  #marquee{position:fixed;display:none;border:1px solid var(--accent);background:rgba(76,110,245,.12);z-index:25;pointer-events:none;}
  /* on-demand spell-CHECK: a suspected misspelling in already-written (not-being-edited) text */
  .typo{ text-decoration:underline wavy #e03131; -webkit-text-decoration:underline wavy #e03131; text-decoration-skip-ink:none; text-underline-offset:2px; cursor:pointer; border-radius:2px; }
  .typo:hover{ background:rgba(224,49,49,.14); }
  .spell-menu{ position:fixed; z-index:400; min-width:170px; max-width:260px; background:var(--panel,#fff); border:1px solid var(--line,#e3e6ea); border-radius:9px; box-shadow:0 6px 26px rgba(0,0,0,.18); padding:5px; font-size:13px; }
  .spell-item{ display:block; width:100%; text-align:left; border:none; background:none; padding:7px 10px; border-radius:6px; cursor:pointer; color:var(--ink,#2b2f36); font:inherit; }
  .spell-item:hover{ background:var(--accent,#4c6ef5); color:#fff; }
  .spell-sugg{ font-weight:600; }
  .spell-act{ color:var(--muted,#868e96); }
  .spell-none{ padding:7px 10px; color:var(--muted,#868e96); font-style:italic; }
  .spell-sep{ height:1px; background:var(--line,#e3e6ea); margin:5px 4px; }
  #notify{position:fixed;top:56px;right:12px;max-width:min(380px,calc(100vw - 24px));box-sizing:border-box;background:#2b2f36;color:#fff;border-left:4px solid #f59f00;padding:10px 16px;border-radius:8px;font-size:13px;line-height:1.45;box-shadow:0 8px 26px rgba(0,0,0,.28);z-index:560;opacity:0;pointer-events:none;transition:opacity .2s;cursor:pointer;}   /* 1.77.0: top-right so a sync/status toast never covers the bottom image-edit toolbar */
  #notify.show{opacity:1;pointer-events:auto;}
  .spacer{flex:1 1 auto;}
  .zoomctl{display:flex;align-items:center;gap:2px;}
  .zoomctl button{width:30px;}
  /* Presentation / focus mode — chrome-free, read-only walkthrough */
  body.present-mode #topbar, body.present-mode #leftbar, body.present-mode #propBar, body.present-mode #basket{display:none!important;}
  body.present-mode .handle, body.present-mode .rotate-handle, body.present-mode .arrow-hit, body.present-mode .ep-handle{display:none!important;}
  body.present-mode .card [contenteditable],body.present-mode .card input,body.present-mode .card textarea,body.present-mode .card .note-content,body.present-mode .card .tcell{pointer-events:none;-webkit-user-select:none;user-select:none;}   /* a presentation is READ-ONLY: fresh cards get contenteditable only on first edit, and todo checkboxes are native inputs — block them all at hit-test */
  body.present-mode #viewport{cursor:default;}
  body.present-mode .card{cursor:zoom-in;}   /* REVIEW FIX (LOW): the .18s box-shadow transition crossfaded the veil between slides — a bright hole glowed at the PREVIOUS card for ~180ms every step; the veil now snaps with the camera */
  body.present-mode .card.present-focus{box-shadow:0 0 0 100000px rgba(0,0,0,.5);z-index:5;background:var(--panel,#fff);}   /* (2.2.2) the crop-studio mega-shadow trick: everything around the focused card dims to a 50% veil — no overlay element, follows the card through zoom. REVIEW FIX (MED): the solid backing applies to EVERY focused card — a .transparent card's see-through interior was an un-dimmed hole showing raw board content */
  body.present-mode .card-shape.present-focus,body.present-mode .card-file.present-focus,body.present-mode .card-mindmap.transparent.present-focus{box-shadow:0 0 0 100000px rgba(0,0,0,.5) !important;background:var(--panel,#fff) !important;}   /* REVIEW FIX (HIGH): types whose base styles use !important (shape :536/:539, transparent mind-map :340) beat the plain veil rule — a transparent mind-map slide dropped the ENTIRE veil (whole board flashed bright). The !important rescue now covers all three */
  body.present-mode .card.locked::after,body.present-mode .sync-badge,body.present-mode .sync-prompt{display:none;}   /* REVIEW FIX (MED): padlocks (z-6), sync badges (z-6) and the sync-prompt strip (z-7) sat ABOVE the veil (focused card is z-5) — full-brightness glyphs floating on the darkness, and the badge/prompt stayed CLICKABLE mid-show. A presentation is pure view */
  .present-bar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:200;display:flex;align-items:center;gap:4px;
    background:rgba(22,24,28,.88);color:#fff;padding:5px 8px;border-radius:30px;box-shadow:0 8px 28px rgba(0,0,0,.4);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);}
  .present-btn{border:none;background:transparent;color:#fff;font-size:19px;line-height:1;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
  .present-btn:hover{background:rgba(255,255,255,.16);}
  .present-count{font-size:13px;min-width:70px;text-align:center;opacity:.92;font-variant-numeric:tabular-nums;padding:0 2px;}
  /* Lock a card to the board */
  .card.locked .handle, .card.locked .rotate-handle{display:none!important;}
  .card.locked::after{content:'';position:absolute;right:5px;top:5px;width:15px;height:15px;z-index:6;pointer-events:none;opacity:.5;
    background:no-repeat center/13px url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232b2f36' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='5' y='11' width='14' height='9' rx='2'/><path d='M8 11V8a4 4 0 0 1 8 0v3'/></svg>");}
  .lock-btn.on{color:var(--accent);}
  /* Export menu */
  .export-menu{position:fixed;z-index:400;background:var(--panel,#fff);border:1px solid var(--line,#e3e6ea);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:5px;min-width:210px;}
  .export-item{display:block;width:100%;text-align:left;border:none;background:none;padding:9px 12px;border-radius:7px;cursor:pointer;font:inherit;font-size:13.5px;color:var(--ink,#2b2f36);}
  .export-item:hover{background:var(--accent,#4c6ef5);color:#fff;}
  .export-div{height:1px;background:var(--line,#e3e6ea);margin:5px 6px;}
  .export-item-danger{color:#e03131;}
  .export-item-danger:hover{background:#e03131;color:#fff;}
  /* (2.1.0) Backups recovery panel */
  #bkPanel{position:fixed;inset:0;z-index:290;background:rgba(18,20,24,.45);display:flex;align-items:center;justify-content:center;}
  .bk-card{background:var(--panel,#fff);border-radius:12px;box-shadow:0 18px 60px rgba(0,0,0,.35);width:min(560px,92vw);max-height:80vh;overflow:auto;padding:16px 18px;}
  .bk-card h3{margin:0 0 4px;font-size:16px;}
  .bk-sub{font-size:12px;color:#777;margin:0 0 12px;line-height:1.45;}
  .bk-row{display:flex;align-items:center;gap:8px;padding:9px 4px;border-top:1px solid var(--line,#e3e6ea);flex-wrap:wrap;}
  .bk-info{flex:1 1 auto;min-width:150px;}
  .bk-label{font-size:13px;font-weight:600;}
  .bk-meta{font-size:11.5px;color:#888;}
  .bk-row button{border:1px solid var(--line,#e3e6ea);background:none;border-radius:7px;padding:5px 9px;font:inherit;font-size:12px;cursor:pointer;white-space:nowrap;}
  .bk-row button:hover{background:var(--accent,#4c6ef5);color:#fff;border-color:var(--accent,#4c6ef5);}
  .bk-none{padding:14px 4px;color:#888;font-size:13px;line-height:1.45;}
  .bk-close{margin-top:12px;width:100%;border:none;background:var(--accent,#4c6ef5);color:#fff;border-radius:8px;padding:9px;font:inherit;cursor:pointer;}
  /* Sync (cloud) mode menu — Write vs View only */
  .sync-menu{min-width:246px;}
  .sync-item{display:flex;align-items:center;gap:11px;}
  .sync-item .si-ic{font-size:15px;width:20px;text-align:center;flex:none;}
  .sync-item .si-tx{display:flex;flex-direction:column;line-height:1.25;}
  .sync-item .si-tx small{color:var(--muted,#8b9096);font-size:11.5px;}
  .sync-item .si-ck{margin-left:auto;color:#2f9e44;font-weight:700;}
  .sync-item:hover .si-tx small,.sync-item:hover .si-ck{color:rgba(255,255,255,.85);}
  .sync-cur{background:var(--bg,#f1f3f5);}
  /* iPhone review-mode top bar (applyPhoneLayout adds body.iphone): hide every original tool-group except the reordered strip; breadcrumb sits on its own row */
  body.iphone #topbar > .tool-group:not(.iph-strip){display:none;}
  body.iphone #topbar .spacer{min-width:0;}
  body.iphone #crumbRow{display:flex;align-items:center;gap:4px;padding:3px 10px;border-bottom:1px solid var(--line,#e3e6ea);overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:26px;font-size:13px;}
  /* Image markup + non-destructive crop */
  .img-wrap{position:relative;line-height:0;}
  .img-inner{position:relative;line-height:0;}
  .img-wrap.cropped{overflow:hidden;}
  .img-wrap.cropped .img-inner{position:absolute;}
  .img-marks{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #cropEditor{position:fixed;inset:0;z-index:300;background:rgba(18,20,24,.82);display:flex;align-items:center;justify-content:center;touch-action:none;}   /* parity with #drawEditor: iOS must not hijack two-finger gestures mid-crop */
  .crop-img{display:block;user-select:none;-webkit-user-select:none;}   /* sized by the editor's layout() — small images scale up so the crop box stays workable */
  .crop-box{position:fixed;border:2px solid #fff;box-shadow:0 0 0 100000px rgba(0,0,0,.45);cursor:move;box-sizing:border-box;}
  .crop-box::before{content:'';position:absolute;inset:0;pointer-events:none;   /* 3×3 rule-of-thirds grid (Bob, per the Milanote reference) */
    background-image:linear-gradient(to right, rgba(255,255,255,.55) 1px, transparent 1px),linear-gradient(to bottom, rgba(255,255,255,.55) 1px, transparent 1px);
    background-size:33.334% 33.334%;background-position:-1px -1px;}
  .crop-grip{position:absolute;width:16px;height:16px;background:#fff;border:1.5px solid var(--accent,#4c6ef5);border-radius:3px;}
  .crop-nw{left:-9px;top:-9px;cursor:nwse-resize;} .crop-se{right:-9px;bottom:-9px;cursor:nwse-resize;}
  .crop-ne{right:-9px;top:-9px;cursor:nesw-resize;} .crop-sw{left:-9px;bottom:-9px;cursor:nesw-resize;}
  .crop-bar{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);display:flex;gap:8px;z-index:301;flex-wrap:wrap;justify-content:center;max-width:96vw;}   /* REVIEW FIX (MED): the viewer bar now holds 8 items — on iPhone/Split View it overflowed the screen with no wrap; wrapping keeps every button reachable (harmless for the crop editor's shorter bar) */
  .iv-count{color:#fff;font-size:13px;align-self:center;padding:0 4px;min-width:52px;text-align:center;opacity:.85;user-select:none;-webkit-user-select:none;}   /* (2.2.1) viewer cycling position indicator */
  .iv-bar .crop-btn{padding:10px 14px;}  .iv-bar{gap:6px;}   /* (2.2.3) one-row fit on iPad: ~750px of buttons -> ~600px */
  body.iv-open #propBar{visibility:hidden;}   /* (2.2.3, Bob) the bottom card bar under the viewer was clutter; visibility (not display) keeps the layout — the viewer's rotate still writes into it safely */
  .crop-btn{border:none;border-radius:22px;padding:10px 20px;font:inherit;font-size:14px;cursor:pointer;background:rgba(255,255,255,.92);color:#1f2733;}
  .crop-btn.crop-apply{background:var(--accent,#4c6ef5);color:#fff;}
  .crop-btn.disabled{opacity:.45;cursor:default;}
  #imgViewer{position:fixed;inset:0;z-index:300;background:rgba(18,20,24,.86);display:flex;align-items:center;justify-content:center;touch-action:none;}
  .iv-frame{position:relative;overflow:hidden;box-shadow:0 10px 44px rgba(0,0,0,.5);background:#111;}   /* the frame IS the crop window; the full image slides behind it */
  .iv-inner{position:absolute;line-height:0;}
  .iv-img{width:100%;height:100%;display:block;}
  .iv-marks{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  #zoomLabel{min-width:46px;text-align:center;font-size:12px;color:var(--muted);}

  #breadcrumb{
    display:flex;align-items:center;gap:4px;
    min-width:0;overflow:hidden;flex:0 1 auto;font-size:13px;margin-left:2px;
  }
  .crumb{border:none;background:none;color:var(--accent);cursor:pointer;padding:2px 4px;border-radius:6px;font-size:13px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .crumb:hover{background:var(--accent-soft);}
  .crumb.drop-target{background:var(--accent) !important;color:#fff !important;}
  .crumb:last-child{color:var(--ink);font-weight:600;}
  .crumb.crumb-home{display:inline-flex;align-items:center;gap:4px;font-weight:600;}   /* (1.88.0) house + bold "Home"; the icon inherits the crumb colour (currentColor) so both go blue together inside a sub-Board */
  .crumb-home-ic{display:inline-flex;flex:0 0 auto;}
  .crumb-home-ic svg{width:14px;height:14px;display:block;}
  .crumb-home .crumb-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .crumb-sep{color:var(--muted);}

  /* ---------- Stage: left toolbar · center · right basket ---------- */
  #stage{display:flex;flex:1 1 auto;min-height:0;position:relative;}   /* positioned so the full-window draw editor overlay can cover it */
  #center{flex:1 1 auto;display:flex;flex-direction:column;min-width:0;}
  #leftbar{flex:0 0 auto;width:66px;background:#edf0f4;border-right:1px solid var(--line);display:flex;flex-direction:column;gap:15px;padding:14px 4px;overflow-y:auto;z-index:18;}
  .ltool{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:transparent;padding:0;font-size:11px;font-weight:500;cursor:grab;color:#5b626d;font-family:inherit;line-height:1.1;}
  .ltool:active{cursor:grabbing;}
  .lt-ic{width:38px;height:38px;background:#fff;border-radius:11px;box-shadow:0 1px 3px rgba(20,24,34,.12);display:flex;align-items:center;justify-content:center;color:#3a3f47;transition:box-shadow .12s,transform .12s;}
  .lt-ic svg{width:26px;height:26px;display:block;}   /* fill more of the 38px tile (bigger, clearer icon; tile size unchanged) */
  .ltool:hover .lt-ic{box-shadow:0 3px 9px rgba(20,24,34,.18);transform:translateY(-1px);}
  .ltool[data-add="board"] .lt-ic{background:linear-gradient(135deg,#5c7cfa,#4263eb);color:#fff;box-shadow:0 2px 7px rgba(66,99,235,.35);}
  .ltool.dragging-new{opacity:.5;}
  .ltool.active .lt-ic{background:var(--accent);color:#fff;box-shadow:0 3px 9px rgba(76,110,245,.4);}
  .lt-spacer{flex:1 1 auto;min-height:10px;}                                    /* pushes the reserved slots to the bottom */
  .lt-reserved{cursor:default;}
  .lt-reserved .lt-ic{background:transparent;border:1.5px dashed #c3c9d3;box-shadow:none;color:#bcc2cc;}
  .lt-reserved:hover .lt-ic{box-shadow:none;transform:none;}
  body.connect-mode .arrow-hit{pointer-events:none;}   /* in connect mode, existing lines don't intercept the gesture */
  /* right basket (Unsorted tray) */
  #basket{flex:0 0 auto;width:0;background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden;transition:width .14s ease;}
  #basket.show{width:210px;}
  #basket.drop-hover{box-shadow:inset 0 0 0 2px var(--accent);}
  .basket-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);font-size:14px;}
  .basket-head b{flex:1 1 auto;}
  #basketList{flex:1 1 auto;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px;}
  .basket-item{display:flex;align-items:center;gap:8px;padding:6px;border:1px solid var(--line);border-radius:8px;cursor:grab;background:#fff;}
  .basket-item:hover{background:#f0f2f5;}
  .basket-item .bi-thumb{width:34px;height:34px;flex:0 0 auto;border-radius:6px;background:#f1f3f5;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;}
  .basket-item .bi-thumb img{width:100%;height:100%;object-fit:cover;}
  .basket-item .bi-name{flex:1 1 auto;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .basket-item .bi-del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;}
  .basket-empty{padding:14px;font-size:11px;color:var(--muted);text-align:center;}
  #basket.show .basket-empty{display:block;}
  #basketList:not(:empty)+.basket-empty{display:none;}

  /* ---------- Canvas ---------- */
  #viewport{
    position:relative;flex:1 1 auto;overflow:hidden;cursor:default;
    touch-action:none;   /* the canvas handles its own pan/pinch (touch gesture manager) — stops iOS from hijacking one-finger drag as page-scroll and two-finger as browser-zoom */
    background-image:none;   /* the faint square-dot grid is applied live by applyView() — it fades out below ~100% zoom (dense dots can trigger trypophobia) while snapping stays on */
    background-size:10px 10px;background-position:0 0;
  }
  #viewport.panning{cursor:grabbing;}
  /* while a field is actively being edited, let touch do normal caret / text-selection / scroll INSIDE it (the drag-move on a non-editing card stays touch-action:none) */
  [contenteditable="true"], #viewport input, #viewport textarea{ touch-action:auto; -webkit-user-select:text; }
  .lp-pick{box-shadow:0 10px 26px rgba(20,24,34,.28) !important;filter:brightness(1.02);}   /* long-press pick-up feedback: the card visibly lifts the moment it's grabbed */
  /* full-canvas Draw / Annotate sessions */
  .ltool.annotate-on .lt-ic{background:#e03131;color:#fff;box-shadow:0 3px 9px rgba(224,49,49,.45);}   /* the Annotate tile burns red while the session is live (click again to finish) */
  .ltool.tool-disabled{opacity:.35;cursor:not-allowed;}                                            /* greyed while the draw editor is open — finish with ✓ Done first */
  .ltool.tool-disabled .lt-ic{box-shadow:none;transform:none;}
  #drawDone,#annotateSnap{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:70;background:var(--accent);color:#fff;border:none;border-radius:999px;padding:10px 24px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;box-shadow:0 4px 14px rgba(76,110,245,.45);}
  #drawDone:hover,#annotateSnap:hover{filter:brightness(1.07);}
  .prop-btn.disabled{opacity:.35;cursor:not-allowed;}          /* greyed session tools while the card is at rest (edit via ✎ Edit) */
  #viewport.draw-session{outline:2px solid var(--accent);outline-offset:-2px;}   /* subtle frame = you're on a drawing sheet, the board is still underneath */
  #drawEditor{position:absolute;inset:0;z-index:80;background:rgba(38,43,54,.5);overflow:hidden;touch-action:none;}   /* the full-window drawing editor: focused, dimmed surroundings */
  #edHolder{position:absolute;left:0;top:0;transform-origin:0 0;box-shadow:0 12px 44px rgba(0,0,0,.4);}
  #edHolder svg{display:block;flex:none;min-height:0;border-radius:2px;}      /* neutralize .sketch-svg's fill-the-card sizing — the editor sizes it explicitly */
  .card,.card img{-webkit-touch-callout:none;-webkit-user-select:none;}   /* iOS: our long-press means "pick the card up" — suppress the native image callout/preview that would steal it (editable fields re-enable selection above) */
  #topbar,#leftbar,#propBar,#basket,.sync-panel,.sync-pop,.style-pop,.export-menu,.spell-menu,.shape-pop,.cover-pop,.present-bar,.bk-card{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;touch-action:manipulation;}   /* (2.2.1, Bob's iPad report) UI chrome must NEVER take the native blue selection highlight when a touch-drag/long-press sweeps across buttons — the marquee itself only ever iterates board cards, so this visual mis-selection was the whole bug. touch-action:manipulation (NOT none): phone topbar / leftbar / propBar rely on overflow scrolling */
  #topbar input,#topbar textarea,#propBar input,.sync-panel input,.sync-pop input,.bk-card input{user-select:text;-webkit-user-select:text;touch-action:auto;}   /* real text fields inside chrome keep caret + selection */
  @media (pointer:coarse){                          /* finger-sized targets on touch devices — the Mac (fine pointer) keeps its tight UI unchanged */
    .handle-resize{ width:22px;height:22px;right:-9px;bottom:-9px; }
    .ep-handle{ stroke-width:3.5; }
    .prop-btn{ min-height:34px; }
    button.btn.icon{ min-width:36px; min-height:34px; }
    .lt-ic{ box-shadow:0 1px 3px rgba(20,24,34,.14); }
  }
  #world{position:absolute;left:0;top:0;transform-origin:0 0;}
  #arrowSvg{position:absolute;left:0;top:0;overflow:visible;}
  #drawSvg,#overlaySvg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  #cardsLayer{position:absolute;left:0;top:0;}

  .arrow{stroke:#6b7480;stroke-width:2;fill:none;pointer-events:none;}
  .arrow-hit{stroke:transparent;stroke-width:14;cursor:pointer;pointer-events:stroke;fill:none;}
  .arrow-halo{stroke:var(--accent);stroke-width:8;opacity:.3;fill:none;stroke-linecap:round;pointer-events:none;}

  /* ---------- Cards ---------- */
  .card{
    position:absolute;background:var(--card-color,#fff);border:1px solid rgba(20,24,34,.10);
    border-radius:0;box-shadow:none;min-width:120px;min-height:48px;   /* Milanote-style sharp 90° corners; flat on the canvas (no resting shadow) */
    --card-color:#fff;user-select:none;
  }
  .card.selected{outline:2px solid var(--accent);outline-offset:2px;}
  .card.editing{cursor:text;}
  .card.dragging{box-shadow:var(--lift-shadow);outline:none;}   /* while dragging: float with a shadow, but drop the selection outline so the card's true edges stay visible for precise placement (selection outline returns on drop) */

  .note-content{
    padding:12px 14px;font-family:Arial,Helvetica,sans-serif;font-size:var(--font-size,14px);line-height:1.45;min-height:24px;outline:none;
    white-space:pre-wrap;word-break:break-word;cursor:inherit;
    color:var(--font-color,#2b2f36);text-align:var(--text-align,left);
  }
  .note-content a:not(.xlink){color:#1c7ed6;text-decoration:underline;cursor:pointer;}   /* Milanote-style hyperlink inside a note (paste a URL onto selected text); click opens when not editing */
  .note-content a:not(.xlink):hover{color:#1864ab;}
  /* Milanote-style BLOCK styles inside a note (style menu / ⌘⇧ shortcuts) */
  .note-content h1{font-size:26px;font-weight:800;font-family:Georgia,'Times New Roman',serif;line-height:1.2;margin:.35em 0 .25em;}
  .note-content h2{font-size:18px;font-weight:700;font-family:Georgia,'Times New Roman',serif;line-height:1.25;margin:.35em 0 .2em;}
  .note-content h6{font-size:11.5px;font-weight:400;color:#6b7280;line-height:1.4;margin:.2em 0;}                       /* "Small text" */
  .note-content blockquote{border-left:3px solid;color:var(--font-color,#3f4650);margin:.45em 0;padding:.15em 0 .15em 12px;font-style:italic;}   /* follows the card's font colour (bar = currentColor) -> readable on dark cards too */
  .note-content pre{background:#eef0f2;color:#2b2f36;border-radius:6px;padding:8px 10px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;white-space:pre-wrap;word-break:break-word;margin:.45em 0;}   /* fixed light chip + pinned dark text: legible on ANY card colour */
  .note-content .note-callout{background:#f1f3f5;color:#2b2f36;border-radius:8px;padding:10px 12px 10px 38px;position:relative;margin:.45em 0;min-height:20px;}
  .note-content .note-callout::before{content:'⚠️';position:absolute;left:11px;top:9px;font-size:14px;}
  .note-clip{position:relative;}
  .card-note .note-clip{height:100%;overflow:hidden;}            /* a resized note clips overflowing text to its box (the SE resize handle is a sibling, so it isn't clipped) */
  .card-note.overflowing:not(.editing) .note-clip::after{        /* Milanote-style: fade the last visible line to hint there's more — double-click expands the card to show it all */
    content:'';position:absolute;left:0;right:0;bottom:0;height:38px;pointer-events:none;
    background:linear-gradient(to bottom, transparent, var(--card-color,#fff));
  }
  .card.transparent{background:transparent;border-color:transparent;box-shadow:none;}
  .card-image.transparent{border:none;}   /* a transparent 1px border would still INSET the picture — adjacent transparent images must touch with zero seam (compositing) */
  .outline-btn.on{color:var(--accent);}
  .card-table{border:none;display:flex;flex-direction:column;}                  /* grid is the boundary (no double frame); flex lets the grid fill the card height */
  .table-wrap{padding:0;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}   /* flush + stretches so there's never a bare strip below the grid */
  table.tbl{border-collapse:collapse;width:100%;table-layout:fixed;font-size:13px;flex:1 1 auto;}   /* grid fills the card height; table-layout:fixed distributes extra height to rows */
  .tcell{border:1px solid var(--line);padding:7px 9px;min-width:36px;height:calc(1.4em + 14px);vertical-align:top;word-break:break-word;outline:none;line-height:1.4;font-size:var(--font-size,13px);color:var(--font-color,#2b2f36);text-align:var(--text-align,left);}   /* reserve one line of the cell's own font (+ 7px×2 padding) so an empty new-table row is already the height of a typed row — no jump when you key in text (for display:table-cell, height acts as a minimum and em scales per-cell) */
  .tcell:empty::before{content:'';}
  th.tcell{background:#d6dbe1;font-weight:600;color:#3a3f47;}   /* clearer grey header row */
  .tcell[contenteditable="true"]{box-shadow:inset 0 0 0 2px var(--accent);}
  .card.selected .tcell.cell-selected{box-shadow:inset 0 0 0 2px var(--accent);}   /* selected cells (for formatting) */
  .table-ctl{display:none;gap:4px;flex-wrap:wrap;padding:8px;}   /* padding (not margin) so the buttons get breathing room now that the table is flush */
  .card.selected .table-ctl{display:flex;}
  .tbtn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:var(--ink);font-family:inherit;}
  .tbtn:hover{background:#f0f2f5;border-color:#d3d8df;}
  .tbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
  .tbtn:disabled{opacity:.38;cursor:default;}                                   /* －Col/－Row greyed out unless a full column/row is selected */
  .tbtn:disabled:hover{background:#fff;border-color:var(--line);}
  /* Mind Map card */
  .card-mindmap{overflow:hidden;background:var(--card-color,#fff);}
  .card-mindmap.transparent{background:transparent!important;border-color:transparent!important;box-shadow:none!important;}   /* Transparent: show only the tree */
  .card-mindmap .handle-resize{display:none;}                                   /* auto-sizes to the tree */
  .mm-wrap{position:relative;}
  .mm-svg{position:absolute;left:0;top:0;pointer-events:none;overflow:visible;}
  .mm-node{position:absolute;box-sizing:border-box;padding:7px 12px;border:1.5px solid #ced4da;border-radius:8px;background:#fff;color:#2b2f36;line-height:1.34;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word;cursor:default;user-select:none;outline:none;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .mm-node.mm-selected{box-shadow:0 0 0 2px var(--accent);z-index:2;}           /* accent ring works over any outline style (box / underline / none) */
  .mm-node[contenteditable="true"]{cursor:text;user-select:text;background:#fff!important;color:#2b2f36!important;}   /* editing: force a readable white box even over a coloured/transparent topic */
  .mm-wedge{position:absolute;width:8px;cursor:ew-resize;z-index:4;border-radius:3px;}
  .mm-wedge:hover{background:var(--accent-soft);}
  .mm-fold{position:absolute;width:18px;height:18px;border-radius:50%;border:1.5px solid #adb5bd;background:#fff;color:#495057;font-size:13px;line-height:14px;text-align:center;cursor:pointer;z-index:3;user-select:none;}
  .mm-fold:hover{background:#f1f3f5;}
  .mm-node.mm-dragging{opacity:.6;pointer-events:none;z-index:5;cursor:grabbing;}      /* pointer-events:none so elementsFromPoint sees the drop target under the cursor */
  .mm-node.mm-drop{outline:2px dashed var(--accent);outline-offset:2px;}                /* the node the dragged branch will re-parent under */
  .mm-insert{position:absolute;height:0;border-top:3px dashed var(--accent);border-radius:2px;pointer-events:none;z-index:6;}   /* (1.90.0) drag-reorder: a dashed line showing exactly WHERE the dragged topic will land among its siblings */
  .mm-insert::before{content:'';position:absolute;left:-4px;top:-4px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  /* spreadsheet-style row/column selector tabs around a selected table */
  .table-frame{position:relative;flex:1 1 auto;min-height:0;display:flex;flex-direction:column;}
  .table-headers{position:absolute;inset:0;pointer-events:none;display:none;}
  .card-table.selected .table-headers{display:block;}             /* tabs appear only on a selected top-level table (never on a table nested in a column) */
  .th-col,.th-row,.th-corner{background:#e9ecef;border:1px solid var(--line);color:#6b7280;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;pointer-events:auto;border-radius:6px;box-sizing:border-box;user-select:none;}
  .th-col{position:absolute;top:-27px;height:22px;}          /* left/width synced to the REAL column by syncHeaderTabs */
  .th-row{position:absolute;left:-31px;width:26px;}          /* top/height synced to the REAL row */
  .th-corner{position:absolute;top:-27px;left:-31px;width:26px;height:22px;}
  .th-col:hover,.th-row:hover,.th-corner:hover{background:#d6dbe1;}
  .th-grip{position:absolute;pointer-events:auto;z-index:2;}                                   /* Excel-style resize grips on the tab edges */
  .th-col-grip{right:-4px;top:0;bottom:0;width:8px;cursor:col-resize;}
  .th-row-grip{left:0;right:0;bottom:-4px;height:8px;cursor:row-resize;}
  .th-col-grip:hover,.th-row-grip:hover{background:var(--accent);opacity:.45;border-radius:3px;}
  .card-sketch{overflow:hidden;}
  .sketch-wrap{display:flex;flex-direction:column;height:100%;}
  .sketch-svg{flex:1 1 auto;width:100%;display:block;background:#fff;border-radius:0;cursor:crosshair;touch-action:none;min-height:60px;}
  .card-sketch.transparent .sketch-svg{background:transparent !important;}
  .note-content[contenteditable="true"]{cursor:text;}
  /* cross-link chips inside notes + internal link cards */
  .xlink{padding:0 4px;border-radius:5px;background:#eef2ff;color:var(--accent);text-decoration:none;font-weight:500;cursor:pointer;}
  .xlink::before{content:'↗ ';font-size:.85em;opacity:.8;}
  .xlink:hover{background:#e0e7ff;}
  .xlink.broken{background:#ffe3e3;color:#e03131;text-decoration:line-through;}
  .link-ttl-link.broken{color:#e03131;text-decoration:line-through;}
  .link.xlink-broken .link-sub{color:#e03131;}
  /* a text passage inside a note that a cross-link points TO (anchor) */
  .xanchor{border-bottom:1px dotted rgba(76,110,245,.55);transition:background .3s;}
  .xanchor.xanchor-flash{background:#ffe066;}
  /* synced cards: SW-corner badge + hover dropdown, and the post-paste "keep in sync?" strip */
  /* Milanote-style: a small, bare, fine red line-mark (no tile/outline/shadow) tucked into the SW corner so it never blocks card text. It is PART OF THE CARD and scales with the canvas zoom; only the pop-out dropdown stays zoom-independent. */
  .sync-badge{position:absolute;left:3px;bottom:3px;display:flex;align-items:center;justify-content:center;color:#e03131;z-index:6;cursor:pointer;line-height:0;}
  .sync-badge svg{width:8px;height:8px;display:block;}
  .sync-badge:hover,.sync-badge.open{color:#c92a2a;}
  /* the synced-copies dropdown lives at body level, position:fixed — constant size & never clipped by card/column/sketch overflow */
  /* ---------------- Phone: Read & Capture mode ----------------
     A phone is for READING boards and CAPTURING quick notes — not for arranging (Milanote's phone philosophy).
     body.phone = a small-screen device; body.view-mode = the reading state (default on phones; ✎ toggles editing). */
  body.phone.view-mode #leftbar,body.phone.view-mode #propBar{display:none;}                /* the canvas gets the WHOLE screen */
  body.phone.view-mode .card [contenteditable]{pointer-events:none;-webkit-user-select:none;user-select:none;}   /* a stray tap must never pop the keyboard */
  body.phone.view-mode .card.qc-live [contenteditable]{pointer-events:auto;-webkit-user-select:text;user-select:text;}   /* …except the note just captured with ＋ */
  body.phone.view-mode .handle,body.phone.view-mode .rotate-handle{display:none;}           /* no resize/rotate affordances while reading */
  body.phone.view-mode .arrow-hit,body.phone.view-mode .ep-handle{pointer-events:none;}     /* lines/endpoints are inert while reading — swipes over them pan the board */
  body.phone.view-mode #undoBtn,body.phone.view-mode #redoBtn,body.phone.view-mode #connectorBtn,body.phone.view-mode #xlinkBtn,body.phone.view-mode #syncBtn,body.phone.view-mode #zoomOut,body.phone.view-mode #zoomLabel,body.phone.view-mode #zoomIn,body.phone.view-mode #basketTab,body.phone.view-mode #basket{display:none;}   /* keep: back/forward, search, duplicate, tree, cloud, Fit, ✎ */
  #editToggle,#quickCap{display:none;}
  body.phone #editToggle{display:inline-flex;}
  body.phone.view-mode #quickCap{position:fixed;right:18px;bottom:calc(24px + env(safe-area-inset-bottom,0px));z-index:90;display:flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:32px;line-height:1;font-family:inherit;box-shadow:0 6px 20px rgba(76,110,245,.5);cursor:pointer;}
  body.phone.view-mode #quickCap:active{transform:scale(.94);}
  /* compact rail while EDITING on a phone: icon-only tiles, slimmer rail; the topbar slims + scrolls so nothing is unreachable */
  body.phone #topbar{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;}
  body.phone #topbar>*{flex:0 0 auto;}
  body.phone:not(.view-mode) #xlinkBtn,body.phone:not(.view-mode) #zoomLabel{display:none;}   /* phone edit mode: rarely-used chrome folds away */
  body.phone #leftbar{width:50px;gap:10px;padding:10px 3px;}
  body.phone .ltool{font-size:0;gap:0;}
  body.phone .lt-ic{width:36px;height:36px;}
  body.phone .lt-ic svg{width:23px;height:23px;}
  /* --- Duplicate check modal --- */
  #dupModal{position:fixed;inset:0;z-index:120;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;}
  #dupModal.show{display:flex;}
  .dup-box{width:min(580px,92vw);max-height:78vh;background:#fff;border-radius:14px;box-shadow:0 18px 60px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;}
  .dup-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);font-weight:700;font-size:15px;}
  .dup-head .dup-count{font-weight:500;color:var(--muted);font-size:13px;flex:1 1 auto;}
  .dup-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);padding:2px 8px;border-radius:8px;} .dup-close:hover{background:#f1f3f5;color:var(--ink);}
  .dup-list{overflow:auto;padding:10px 14px 14px;}
  .dup-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;}
  .dup-item:first-child{margin-top:0;}
  .dup-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .dup-badge{background:#eef2f6;border-radius:6px;padding:2px 7px;font-weight:600;color:#3b4754;}
  .dup-prev{font-size:13.5px;color:var(--ink);margin-bottom:8px;word-break:break-word;display:flex;align-items:center;gap:8px;}
  .dup-prev img{width:44px;height:33px;object-fit:cover;border-radius:6px;border:1px solid var(--line);flex:0 0 auto;}

  .sync-pop{position:fixed;z-index:62;min-width:210px;max-width:280px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 10px 30px rgba(15,23,42,.20);padding:6px;cursor:default;}
